skill_id: continue
version: 0.1.0
status: active
canonical_path: .agents/skills/continue
summary: Resume sys-for-ai-dev from tracked state and advance at most one authorized AgentJob.
scope:
  system_agnostic: false
  target_system_types:
    - sys-for-ai-dev development workspace
    - sys-for-ai product scaffold
  intentional_specialization: Project-fit runtime continuation skill for sys-for-ai-dev.
  exemptions: []
domain_emphasis:
  - continuation_control
  - source_first_authority
  - agentjob_governance
  - validation_handoff
required_role_posture:
  - system_analyst
  - system_engineer
  - software_engineer
  - control_loop_planner
optional_role_posture:
  - documentation_librarian
  - requirements_verifier
  - verification_engineer
activation:
  triggers:
    - Continue work from tracked state.
    - Resume the implementation plan from the latest handoff.
  when_not_to_use:
    - Do not use for unbounded multi-AgentJob execution.
    - Do not use generated derivatives or chat memory as authority.
  preconditions:
    - Work is occurring in the sys-for-ai-dev development workspace.
    - The self-hosting boundary decision record can be inspected before task work.
    - Program state, latest handoff, and useful memory hits can be verified against source files or registry rows.
inputs:
  required:
    - Current user continuation request or active task objective.
    - sys-for-ai/control_records/program_state.yaml.
    - Latest tracked handoff when one exists.
  optional:
    - Root implementation plan named by the user.
    - Memory preflight evidence and source registry rows.
    - Active AgentJob, Director decision, completion receipt, or prior temp_handoff file.
outputs:
  primary:
    - One completed bounded task or a blocked stop packet.
    - Validation evidence for the selected AgentJob or explicit blocker.
  evidence:
    - Program state, latest handoff, memory preflight, selected AgentJob, and validators used.
  handoff:
    - Next temp_handoff file with validation evidence and next logical step.
dependencies:
  required_skills: []
  optional_skills:
    - source-first-memory
  validation_skills: []
  python:
    standard_library_only: true
    notes: Runtime manifest validation uses repository-local standard-library tooling.
  external_tools:
    - python3
    - make
    - git
authority:
  may_read:
    - Root README, PRDs, implementation plans, registries, validators, schemas, templates, and git-tracked files.
    - sys-for-ai control records, program state, AgentJobs, Director decisions, completions, handoffs, and memory preflight receipts.
    - Active runtime skills under .agents/skills and compatibility shims under .codex/skills.
  may_write:
    - Files explicitly authorized by the selected AgentJob.
    - Completion receipt and handoff evidence for the selected bounded task.
    - .agents/skills/continue when maintaining this runtime skill.
    - .codex/skills/continue/SKILL.md when maintaining the compatibility shim.
  may_not:
    - Execute more than one AgentJob in one invocation.
    - Use chat memory, generated derivatives, local caches, or summaries as authority.
    - Mutate activated control records without supersession.
    - Treat sys-for-ai/skills/core as active development-runtime authority unless explicitly promoted.
  canonical_sources:
    - Root PRDs and implementation plans.
    - sys-for-ai/control_records/program_state.yaml.
    - Registered AgentJobs, Director decisions, completions, handoffs, registries, validators, and schemas.
    - Explicit user decisions in the active task.
  generated_derivatives:
    - Generated docs, catalogs, temporary handoffs, summaries, and memory search surfaces.
  human_gates:
    - Director decision or explicit user authorization when no active AgentJob exists.
    - Owner approval before expanding beyond the selected AgentJob boundary.
validation:
  commands:
    - command: python3 scripts/skills/validate_skill_manifest.py --manifest .agents/skills/continue/skill.yaml
      validator_class: schema_validation
      mode: required
      dry_runnable: true
      notes: Checks the active runtime manifest for this skill.
    - command: test -f .agents/skills/continue/SKILL.md && test -f .agents/skills/continue/README.md && test -f .agents/skills/continue/AGENTS.md
      validator_class: path_validation
      mode: required
      dry_runnable: true
      notes: Confirms the active runtime package keeps required docs.
    - command: test -f .codex/skills/continue/SKILL.md
      validator_class: path_validation
      mode: required
      dry_runnable: true
      notes: Confirms the Codex compatibility shim exists.
  validator_classes:
    - schema_validation
    - path_validation
    - dependency_validation
    - trace_validation
    - process_validation
  contextual_validation_rationale: Runtime correctness depends on current tracked state, selected AgentJob scope, and project-local validators.
  evidence_required:
    - Self-hosting boundary decision record inspected.
    - Program state and latest handoff inspected.
    - Memory preflight run and source or registry evidence checked when memory affects routing.
    - Validation commands run or skipped with reasons.
handoff:
  requires_completion_receipt: true
  evidence:
    - Selected AgentJob or explicit blocked reason.
    - Files changed and source authority used.
    - Validation commands run, skipped checks, and residual risk.
    - Logical next step and any human approval gate.
  next_role: system_director or implementation_initialization_agent for the next bounded AgentJob.
  open_issue_policy: Record missing authority, unresolved ambiguity, validation failures, or Director-decision blockers before stopping.
failure_modes:
  - mode: Unbounded execution request.
    recovery: Select one authorized AgentJob, complete it, write handoff, commit, and stop.
  - mode: Authority inversion.
    recovery: Re-anchor to tracked program state, latest handoff, registered control records, and canonical sources.
  - mode: Director decision missing.
    recovery: Stop with a Director-decision-required packet unless the task creates an explicit tracked authorization artifact.
compatibility_shims:
  - .codex/skills/continue/SKILL.md
