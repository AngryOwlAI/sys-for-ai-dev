skill_id: director-decision-governor
version: 0.1.0
status: active
lifecycle_status: adapted_runtime_active
canonical_path: .agents/skills/director-decision-governor
summary: Govern Director Decision Records for routing, authority expansion, job creation, and supersession.
scope:
  system_agnostic: true
  target_system_types:
    - agentic development systems
    - generated target systems
  intentional_specialization: Core Director decision governance skill.
  exemptions: []
domain_emphasis:
  - decision_governance
  - routing_authority
  - bounded_execution
required_role_posture:
  - system_analyst
  - system_engineer
  - software_engineer
  - system_director
activation:
  triggers:
    - No active project authorization authorizes the next route.
    - A task needs authority expansion.
    - A completed decision must be superseded.
  when_not_to_use:
    - Do not use to skip a human gate or act beyond explicit project authority.
  preconditions:
    - Program state and latest handoff have been inspected.
inputs:
  required:
    - Program state.
    - Route candidates.
    - Source evidence for selected route.
  optional:
    - Existing Director decisions.
    - Proposed project authorization boundary.
outputs:
  primary:
    - Director decision record or stop recommendation.
  evidence:
    - Accepted and rejected routes.
    - Decision validator output.
dependencies:
  required_skills: []
  optional_skills:
    - source-first-memory
    - traceability-matrix-engine
  validation_skills: []
  python:
    standard_library_only: true
    notes: No skill-specific Python dependency.
  external_tools:
    - make
authority:
  may_read:
    - Program state, handoffs, implementation plans, registries, legacy control records, and Director decisions.
  may_write:
    - Director decision records only when the current route authorizes decision creation.
  may_not:
    - Authorize work outside the explicit project authority.
    - Mutate completed decisions without supersession.
validation:
  commands:
    - cd Sys4AI && make validate-director-decisions
  validator_classes:
    - schema_validation
    - process_validation
handoff:
  requires_completion_receipt: true
  evidence:
    - Director decision record.
    - Decision validator result.
