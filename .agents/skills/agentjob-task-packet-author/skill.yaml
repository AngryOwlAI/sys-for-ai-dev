skill_id: agentjob-task-packet-author
version: 0.1.0
status: active
lifecycle_status: adapted_runtime_active
canonical_path: .agents/skills/agentjob-task-packet-author
summary: Convert implementation plans into bounded AgentJobs and task packets.
scope:
  system_agnostic: true
  target_system_types:
    - agentic development systems
    - generated target systems
  intentional_specialization: Core AgentJob and task-packet authoring skill.
  exemptions: []
domain_emphasis:
  - agentjob_authoring
  - bounded_execution
  - task_packet_design
required_role_posture:
  - system_analyst
  - system_engineer
  - software_engineer
  - control_loop_agentjob_planner
  - technical_requirements_engineer
activation:
  triggers:
    - A plan needs to become a bounded AgentJob.
    - Allowed reads, writes, validators, and stop conditions must be explicit.
    - A continuation lane needs the next task packet.
  when_not_to_use:
    - Do not use to bypass a required Director decision.
  preconditions:
    - Plan section, decision, or handoff authority is known.
inputs:
  required:
    - Source plan or decision.
    - Intended role and objective.
  optional:
    - Prior handoff, validator list, allowed paths, and stop conditions.
outputs:
  primary:
    - AgentJob or task packet draft.
  evidence:
    - Source authority and boundary rationale.
dependencies:
  required_skills: []
  optional_skills:
    - director-decision-governor
    - context-window-and-handoff-manager
    - source-first-memory
  validation_skills: []
  python:
    standard_library_only: true
    notes: No skill-specific Python dependency.
  external_tools:
    - make
authority:
  may_read:
    - Plans, handoffs, Director decisions, program state, and registries.
  may_write:
    - AgentJobs only when the active Director decision authorizes creation.
  may_not:
    - Widen a packet beyond its selected objective.
validation:
  commands:
    - cd Sys4AI && make validate-agentjobs
  validator_classes:
    - schema_validation
    - process_validation
handoff:
  requires_completion_receipt: true
  evidence:
    - AgentJob boundary rationale.
    - Validator and stop-condition list.
