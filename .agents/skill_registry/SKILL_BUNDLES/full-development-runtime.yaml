bundle_id: full-development-runtime
version: 0.1.0
status: active
description: All retained skills installed as active project-fit sys-for-ai-dev runtime skills.
includes:
  skills:
    - continue
    - source-first-memory
    - codex-usage-metrics
    - conversation-to-prd
    - decision-grilling
    - decision-grilling-context-45
    - domain-grilling-with-docs
    - domain-grilling-with-docs-context-45
    - mermaid-diagrams
    - plantuml-diagrams
    - prd-to-implementation-plan
    - system-definition-interview
    - system-definition-interview-context-45
    - technical-writing-quality-gate
    - skill-import-generalizer
  domain_packs: []
  optional_skills: []
  validation_skills: []
install:
  python: false
  external_tools:
    require_notice: true
    install_policy: detect_only
  allow_python_package_install: false
  dry_run_default: true
lock:
  output: .agents/skill_registry/SKILL_LOCK.yaml
  include_generated_timestamp: false
validation:
  commands:
    - python3 scripts/skills/validate_skill_manifest.py --bundle .agents/skill_registry/SKILL_BUNDLES/full-development-runtime.yaml
  expected_validator_classes:
    - schema_validation
    - dependency_validation
