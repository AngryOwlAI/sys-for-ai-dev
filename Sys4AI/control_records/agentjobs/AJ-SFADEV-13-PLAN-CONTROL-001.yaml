agentjob_id: AJ-SFADEV-13-PLAN-CONTROL-001
schema_version: 0.2.0
status: completed
objective: >
  Formalize the user-named PRD decomposition plan pointer and mandatory
  /continue execution protocol as one bounded plan-control update, then close
  the packet with memory preflight, receipt, handoff, registry, validation,
  and temp handoff evidence.
lifecycle_stage: implementation_initialization
role_binding:
  role_id: system_director
  binding_type: one_job_provisional_role
  authority_scope: plan-control routing and continuation closeout
  expires_with_agentjob: true
required_inputs:
  - implementation_plans/self_hosting_boundary_decision_record.md
  - implementation_plans/Sys4AI-dev_all_recommendations_implementation_plan.md
  - implementation_plans/Sys4AI_PRD_decomposition_full_implementation_plan.md
  - Sys4AI/control_records/program_state.yaml
  - Sys4AI/control_records/handoffs/HANDOFF-SFADEV-12-DISCOVERY-GATE-SMOKE-001.yaml
allowed_reads:
  - PRDs/**
  - implementation_plans/**
  - temp_handoff/**
  - Sys4AI/**
  - .agents/skills/continue/SKILL.md
allowed_writes:
  - implementation_plans/Sys4AI-dev_all_recommendations_implementation_plan.md
  - implementation_plans/Sys4AI_PRD_decomposition_full_implementation_plan.md
  - Sys4AI/control_records/director_decisions/DDR-SFADEV-13-PLAN-CONTROL-001.yaml
  - Sys4AI/control_records/agentjobs/AJ-SFADEV-13-PLAN-CONTROL-001.yaml
  - Sys4AI/control_records/memory_preflights/MEMPREFLIGHT-SFADEV-13-PLAN-CONTROL-001.yaml
  - Sys4AI/control_records/completions/RECEIPT-SFADEV-13-PLAN-CONTROL-001.yaml
  - Sys4AI/control_records/handoffs/HANDOFF-SFADEV-13-PLAN-CONTROL-001.yaml
  - Sys4AI/control_records/program_state.yaml
  - Sys4AI/registries/**
  - Sys4AI/docs/generated/**
  - temp_handoff/handoff-0023.md
generated_paths:
  - Sys4AI/docs/generated/**
forbidden_paths:
  - LICENSE
  - NOTICE
  - .git/**
  - .venv/**
  - Sys4AI/.venv/**
  - PRDs/**
  - Sys4AI/docs/generated/** as canonical source
forbidden_actions:
  - Execute more than one AgentJob in this packet.
  - Reopen the completed all-recommendations implementation sequence.
  - Modify canonical PRDs.
  - Promote generated derivatives or compatibility pointers to canonical requirements.
  - Treat memory hits or generated documents as authority without source inspection.
expected_outputs:
  - Active Director Decision selecting this single AgentJob.
  - Compatibility pointer plan path for the user-named implementation plan.
  - Mandatory /continue execution protocol in the canonical all-recommendations plan.
  - Memory preflight receipt with source-first evidence.
  - Completion receipt, controlled handoff, temp handoff, and registry closeout.
  - Program state returned to complete with no active AgentJob or Director Decision.
  - Generated configuration-control derivatives refreshed from registry sources when validation requires it.
validators:
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-director-decisions control_records/director_decisions
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-agentjob control_records/agentjobs/AJ-SFADEV-13-PLAN-CONTROL-001.yaml
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-memory-preflight control_records/memory_preflights
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-agentjob-registry registries/agentjob_registry.csv
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-director-decision-registry registries/director_decision_registry.csv
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-check-diff --agentjob AJ-SFADEV-13-PLAN-CONTROL-001 --json
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-control-loop
  - git diff --check
completion_evidence_required:
  - director_decision
  - memory_preflight
  - changed_artifacts
  - validation_status
  - closeout_handoff
memory_preflight:
  required: true
  minimum_queries:
    - plan control continue protocol
    - PRD decomposition implementation plan pointer
  required_evidence:
    - self-hosting boundary decision record inspection
    - latest handoff inspection
    - canonical all-recommendations plan inspection
    - compatibility pointer inspection
authority_boundary:
  may_modify_plan_control_files: true
  may_modify_control_closeout_records: true
  may_modify_program_state: true
  may_modify_registries: true
  may_refresh_generated_derivatives: true
  may_modify_canonical_prds: false
  may_execute_multiple_agentjobs: false
  may_promote_generated_derivatives: false
handoff_policy:
  create_handoff_when:
    - plan-control update is validated
    - packet closes with no active AgentJob
stop_conditions:
  - A required write falls outside allowed_writes.
  - More than one AgentJob would be required.
  - Validation fails for reasons outside this AgentJob scope.
  - The task would alter canonical PRDs or reopen the completed all-recommendations sequence.
created_at: "2026-07-08T00:31:32Z"
activated_at: "2026-07-08T00:32:43Z"
completed_at: "2026-07-08T00:33:02Z"
