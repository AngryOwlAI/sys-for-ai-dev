  - .agents/skills/init/SKILL.md
  - .agents/skills/system-definition-interview-context-45/SKILL.md
  - .agents/skills/requirements-discovery-governor/SKILL.md
  - Sys4AI/templates/system_definition/requirements-discovery-record-template.md
  - Sys4AI/control_records/program_state.yaml
  - Sys4AI/control_records/handoffs/HANDOFF-SFADEV-16-LEGACY-PENDING-ROW-RECONCILIATION-001.yaml
allowed_reads:
