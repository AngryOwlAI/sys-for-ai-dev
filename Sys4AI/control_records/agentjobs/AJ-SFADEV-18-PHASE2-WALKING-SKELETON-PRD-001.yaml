agentjob_id: AJ-SFADEV-18-PHASE2-WALKING-SKELETON-PRD-001
schema_version: 0.2.0
status: completed
objective: >
  Generate, validate, and promote a controlled Phase 2 walking skeleton PRD
  from the validated Requirements Discovery Record without creating
  implementation code or target-system package outputs.
lifecycle_stage: develop
role_binding:
  role_id: requirements_manager
  binding_type: registered_role
  authority_scope: phase2 walking skeleton PRD generation
  expires_with_agentjob: true
required_inputs:
  - README.md
  - PRDs/Sys4AI_phase-0_product_system_design_prd.md
  - PRDs/Sys4AI_phase-1_implementation_initialization_prd.md
  - implementation_plans/Sys4AI-dev_next_scope_full_implementation_plan.md
  - implementation_plans/Sys4AI_next_scope_full_implementation_plan.md
  - implementation_plans/self_hosting_boundary_decision_record.md
  - Sys4AI/control_records/system_definition/phase2_walking_skeleton_requirements_discovery_record.md
  - Sys4AI/control_records/program_state.yaml
  - Sys4AI/control_records/handoffs/HANDOFF-SFADEV-17-PHASE2-WALKING-SKELETON-RDR-001.yaml
  - .agents/skills/continue/SKILL.md
  - .agents/skills/conversation-to-prd/SKILL.md
allowed_reads:
  - README.md
  - PRDs/**
  - implementation_plans/**
  - temp_handoff/**
  - .agents/skills/continue/**
  - .agents/skills/conversation-to-prd/**
  - Sys4AI/control_records/program_state.yaml
  - Sys4AI/control_records/handoffs/**
  - Sys4AI/control_records/completions/**
  - Sys4AI/control_records/system_definition/**
  - Sys4AI/registries/**
  - Sys4AI/schemas/**
  - Sys4AI/sys_for_ai/**
allowed_writes:
  - Sys4AI/control_records/director_decisions/DDR-SFADEV-18-PHASE2-WALKING-SKELETON-PRD-001.yaml
  - Sys4AI/control_records/agentjobs/AJ-SFADEV-18-PHASE2-WALKING-SKELETON-PRD-001.yaml
  - Sys4AI/control_records/memory_preflights/MEMPREFLIGHT-SFADEV-18-PHASE2-WALKING-SKELETON-PRD-001.yaml
  - PRDs/drafts/Sys4AI_phase-2_walking_skeleton_prd.draft.md
  - PRDs/Sys4AI_phase-2_walking_skeleton_prd.md
  - Sys4AI/control_records/completions/RECEIPT-SFADEV-18-PHASE2-WALKING-SKELETON-PRD-001.yaml
  - Sys4AI/control_records/handoffs/HANDOFF-SFADEV-18-PHASE2-WALKING-SKELETON-PRD-001.yaml
  - Sys4AI/control_records/program_state.yaml
  - Sys4AI/registries/agentjob_registry.csv
  - Sys4AI/registries/director_decision_registry.csv
  - Sys4AI/registries/completion_receipt_registry.csv
  - Sys4AI/registries/handoff_registry.csv
  - Sys4AI/registries/memory_preflight_receipt_registry.csv
  - Sys4AI/registries/requirement_trace_registry.csv
  - Sys4AI/registries/source_registry.csv
  - Sys4AI/registries/control_record_registry.csv
  - Sys4AI/docs/generated/**
  - temp_handoff/handoff-0028.md
generated_paths:
  - Sys4AI/docs/generated/**
forbidden_paths:
  - LICENSE
  - NOTICE
  - .git/**
  - .venv/**
  - Sys4AI/.venv/**
  - Sys4AI/sys_for_ai/walking_skeleton.py
  - Sys4AI/sys_for_ai/target_package.py
  - Sys4AI/sys_for_ai/trace_flow.py
  - Sys4AI/examples/target_systems/**
forbidden_actions:
  - Baseline PRD requirements without RDR trace or approved Director Decision trace.
  - Remove or supersede Phase 0 or Phase 1 PRDs.
  - Create implementation code.
  - Create target-system package or export smoke artifacts.
  - Execute more than one AgentJob in this packet.
  - Treat generated derivatives or memory hits as source authority.
expected_outputs:
  - Director Decision selecting the Phase 2 PRD route.
  - Memory preflight receipt with source-first evidence.
  - Draft Phase 2 walking skeleton PRD.
  - Accepted controlled Phase 2 walking skeleton PRD.
  - Source registry rows for the draft and accepted PRD.
  - Requirement trace continuity evidence.
  - Completion receipt, handoff, and temp handoff evidence.
  - Program state returned to complete with no active AgentJob.
validators:
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-agentjob control_records/agentjobs/AJ-SFADEV-18-PHASE2-WALKING-SKELETON-PRD-001.yaml
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-director-decisions control_records/director_decisions
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-requirement-trace registries/requirement_trace_registry.csv
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-registry-graph registries
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-control-loop
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-check-diff --agentjob AJ-SFADEV-18-PHASE2-WALKING-SKELETON-PRD-001 --json
  - make validate CHECK_DIFF_AGENTJOB=AJ-SFADEV-18-PHASE2-WALKING-SKELETON-PRD-001
  - git diff --check
completion_evidence_required:
  - director_decision
  - memory_preflight
  - draft PRD path
  - accepted PRD path
  - source registry rows
  - requirement trace continuity evidence
  - validation status
  - closeout handoff
memory_preflight:
  required: true
  minimum_queries:
    - Phase 2 walking skeleton PRD
    - RDR to PRD trace validation
  required_evidence:
    - self-hosting boundary decision record inspection
    - latest handoff inspection
    - WS-18 plan inspection
    - Phase 2 RDR inspection
    - conversation-to-prd skill inspection
authority_boundary:
  may_create_phase2_prd: true
  may_create_implementation_plan: false
  may_generate_target_system_code: false
  may_generate_target_system_package: false
  may_modify_control_closeout_records: true
  may_modify_program_state: true
  may_modify_registries: true
  may_refresh_generated_derivatives: true
  may_promote_generated_derivatives: false
handoff_policy:
  create_handoff_when:
    - Phase 2 PRD is produced and validated
    - packet closes with no active AgentJob
stop_conditions:
  - RDR is missing or invalid.
  - Requirement trace cannot be established.
  - PRD synthesis would require implementation code.
  - Package or export smoke artifact creation becomes required.
  - Any write outside the allowed boundary is required.
  - More than one AgentJob would be required.
created_at: "2026-07-08T21:04:10Z"
activated_at: "2026-07-08T21:04:10Z"
completed_at: "2026-07-08T21:04:10Z"
