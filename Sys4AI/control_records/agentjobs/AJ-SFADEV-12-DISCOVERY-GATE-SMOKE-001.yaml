agentjob_id: AJ-SFADEV-12-DISCOVERY-GATE-SMOKE-001
schema_version: 0.2.0
status: completed
objective: >
  Execute one controlled discovery-gate smoke validation packet by creating a
  sample framework-product Requirements Discovery Record, validating it, closing
  the superseded pending smoke stub, and updating continuation evidence.
lifecycle_stage: implementation_initialization
role_binding:
  role_id: user_wants_elicitor
  binding_type: one_job_provisional_role
  authority_scope: discovery gate smoke validation and closeout evidence
  expires_with_agentjob: true
required_inputs:
  - implementation_plans/self_hosting_boundary_decision_record.md
  - Sys4AI/control_records/program_state.yaml
  - Sys4AI/control_records/handoffs/HANDOFF-SFADEV-11-INIT-FRONTDOOR-001.yaml
  - Sys4AI/control_records/agentjobs/AJ-P1-DISCOVERY-GATE-SMOKE-001.yaml
  - Sys4AI/templates/system_definition/requirements-discovery-record-template.md
  - Sys4AI/schemas/discovery_record.schema.yaml
  - Sys4AI/registries/discovery_record_registry.csv
allowed_reads:
  - PRDs/**
  - implementation_plans/**
  - temp_handoff/**
  - .agents/**
  - .codex/**
  - Sys4AI/**
allowed_writes:
  - Sys4AI/Makefile
  - Sys4AI/control_records/agentjobs/AJ-P1-DISCOVERY-GATE-SMOKE-001.yaml
  - Sys4AI/control_records/agentjobs/AJ-SFADEV-12-DISCOVERY-GATE-SMOKE-001.yaml
  - Sys4AI/control_records/director_decisions/DDR-SFADEV-12-DISCOVERY-GATE-SMOKE-001.yaml
  - Sys4AI/control_records/memory_preflights/MEMPREFLIGHT-SFADEV-12-DISCOVERY-GATE-SMOKE-001.yaml
  - Sys4AI/control_records/system_definition/RDR-20260707-001.md
  - Sys4AI/control_records/completions/RECEIPT-SFADEV-12-DISCOVERY-GATE-SMOKE-001.yaml
  - Sys4AI/control_records/handoffs/HANDOFF-SFADEV-12-DISCOVERY-GATE-SMOKE-001.yaml
  - Sys4AI/control_records/program_state.yaml
  - Sys4AI/registries/**
  - Sys4AI/docs/generated/**
  - temp_handoff/handoff-0022.md
generated_paths:
  - Sys4AI/docs/generated/**
forbidden_paths:
  - LICENSE
  - NOTICE
  - .git/**
  - .venv/**
  - Sys4AI/.venv/**
  - PRDs/**
  - Sys4AI/docs/generated/** as canonical source
forbidden_actions:
  - Execute more than one AgentJob in this packet.
  - Reopen the completed all-recommendations plan sequence.
  - Promote candidate requirements to canonical requirements.
  - Create a PRD, USRD, scaffold, or implementation plan from the smoke RDR.
  - Treat generated derivatives or memory hits as source authority.
expected_outputs:
  - Director Decision selecting the smoke validation route.
  - Memory preflight receipt with source-first evidence.
  - One validated Requirements Discovery Record.
  - Discovery registry row for the smoke RDR.
  - Completion receipt, handoff, and temp handoff evidence.
  - Program state returned to complete with no active AgentJob.
validators:
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-agentjob control_records/agentjobs/AJ-SFADEV-12-DISCOVERY-GATE-SMOKE-001.yaml
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-director-decisions control_records/director_decisions
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-discovery-record control_records/system_definition/RDR-20260707-001.md
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-discovery-records registries/discovery_record_registry.csv
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-check-diff --agentjob AJ-SFADEV-12-DISCOVERY-GATE-SMOKE-001 --json
  - make validate
  - git diff --check
completion_evidence_required:
  - director_decision
  - memory_preflight
  - RDR path
  - validation status
  - open issue count
  - closeout handoff
memory_preflight:
  required: true
  minimum_queries:
    - discovery gate smoke validation
    - requirements discovery record
  required_evidence:
    - self-hosting boundary decision record inspection
    - latest handoff inspection
    - pending smoke AgentJob inspection
    - discovery template and validator inspection
authority_boundary:
  may_create_rdr: true
  may_create_usrd: false
  may_promote_candidate_requirements: false
  may_supersede_pending_smoke_stub: true
  may_modify_control_closeout_records: true
  may_modify_program_state: true
  may_refresh_generated_derivatives: true
  may_promote_generated_derivatives: false
handoff_policy:
  create_handoff_when:
    - smoke RDR is produced and validated
    - packet closes with no active AgentJob
stop_conditions:
  - Subject layer cannot be classified.
  - Discovery validator fails after repair within this packet.
  - Any write outside the allowed boundary is required.
  - More than one AgentJob would be required.
created_at: "2026-07-07T23:58:03Z"
activated_at: "2026-07-07T23:58:03Z"
completed_at: "2026-07-07T23:58:03Z"
