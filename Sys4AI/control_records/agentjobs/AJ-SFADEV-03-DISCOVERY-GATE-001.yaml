agentjob_id: AJ-SFADEV-03-DISCOVERY-GATE-001
schema_version: 0.2.0
status: completed
objective: >
  Integrate Requirements Discovery Record and system-definition-interview-context-45
  as the operational first discovery gate for new or substantially changed
  system definitions.
lifecycle_stage: implementation_initialization
role_binding:
  role_id: user_wants_elicitor
  binding_type: one_job_provisional_role
  authority_scope: all-recommendations discovery gate implementation
  expires_with_agentjob: true
required_inputs:
  - implementation_plans/Sys4AI-dev_all_recommendations_implementation_plan.md
  - implementation_plans/self_hosting_boundary_decision_record.md
  - Sys4AI/control_records/program_state.yaml
  - Sys4AI/control_records/handoffs/HANDOFF-SFADEV-02-REGISTRY-SCHEMA-EXPANSION-001.yaml
  - .agents/skills/system-definition-interview-context-45/**
  - Sys4AI/templates/system_definition/requirements-discovery-record-template.md
  - Sys4AI/schemas/discovery_record.schema.yaml
  - Sys4AI/sys_for_ai/discovery.py
  - Sys4AI/registries/discovery_record_registry.csv
allowed_reads:
  - PRDs/**
  - implementation_plans/**
  - temp_handoff/**
  - .agents/**
  - Sys4AI/**
allowed_writes:
  - .agents/skills/system-definition-interview-context-45/**
  - Sys4AI/skills/core/system-definition-interview-context-45/**
  - Sys4AI/templates/system_definition/**
  - Sys4AI/schemas/discovery_record.schema.yaml
  - Sys4AI/sys_for_ai/discovery.py
  - Sys4AI/sys_for_ai/validators.py
  - Sys4AI/sys_for_ai/cli.py
  - Sys4AI/Makefile
  - Sys4AI/tests/test_agentjob_boundaries.py
  - Sys4AI/tests/test_program_state.py
  - Sys4AI/tests/test_self_hosting_acceptance.py
  - Sys4AI/control_records/agentjobs/AJ-P1-DISCOVERY-GATE-SMOKE-001.yaml
  - Sys4AI/control_records/director_decisions/DDR-SFADEV-03-DISCOVERY-GATE-001.yaml
  - Sys4AI/control_records/agentjobs/AJ-SFADEV-03-DISCOVERY-GATE-001.yaml
  - Sys4AI/control_records/memory_preflights/MEMPREFLIGHT-SFADEV-03-DISCOVERY-GATE-001.yaml
  - Sys4AI/control_records/completions/RECEIPT-SFADEV-03-DISCOVERY-GATE-001.yaml
  - Sys4AI/control_records/handoffs/HANDOFF-SFADEV-03-DISCOVERY-GATE-001.yaml
  - Sys4AI/control_records/program_state.yaml
  - Sys4AI/registries/**
  - Sys4AI/docs/generated/**
  - temp_handoff/handoff-0015.md
generated_paths:
  - Sys4AI/docs/generated/**
forbidden_paths:
  - LICENSE
  - NOTICE
  - .git/**
  - .venv/**
  - Sys4AI/.venv/**
  - PRDs/**
  - Sys4AI/docs/generated/** as canonical source
forbidden_actions:
  - Automatically create a PRD without explicit approval.
  - Promote candidate requirements to canonical requirements.
  - Treat generated derivatives or chat memory as source authority.
  - Remove context-45 fail-closed behavior.
  - Execute more than one all-recommendations AgentJob in one continuation invocation.
memory_preflight:
  required: true
  minimum_queries:
    - discovery gate implementation
    - system-definition-interview-context-45 requirements discovery record
  required_evidence:
    - self-hosting boundary decision record inspection
    - latest controlled handoff inspection
    - all-recommendations plan AJ-03 inspection
    - discovery skill template validator and registry inspection
expected_outputs:
  - system-definition-interview-context-45 states it is the default discovery gate.
  - RDR template includes subject layer classification and discovery gate exit checklist.
  - Discovery validator enforces subject layer discovery gate marker authority notice candidate labels and required routing sections.
  - Discovery registry validation resolves registered RDR paths and validates records.
  - Sample discovery-gate smoke AgentJob exists.
  - Completion receipt and handoff evidence.
validators:
  - make validate-dev-skills
  - cd Sys4AI && make validate-discovery-template
  - cd Sys4AI && make validate-discovery-records
  - cd Sys4AI && make validate
completion_evidence_required:
  - changed_artifacts
  - command_results
  - validation_status
  - residual_risk
handoff_policy:
  create_handoff_when:
    - discovery gate implementation completes
    - next AgentJob is recommended
authority_boundary:
  may_modify_product_scaffold: true
  may_modify_canonical_prds: false
  may_modify_runtime_skill_docs: true
  may_modify_discovery_template: true
  may_modify_discovery_validator: true
  may_modify_discovery_registry: true
  may_promote_generated_derivatives: false
  may_change_unrelated_runtime_skill_authority: false
  discovery_registry_surface: Sys4AI/registries/discovery_record_registry.csv
stop_conditions:
  - Required plan or latest handoff source cannot be inspected.
  - RDR authority becomes canonical by accident.
  - Candidate requirements lose REQ-CAND or NFR-CAND labels.
  - Required write is outside allowlist.
  - More than one AgentJob is required.
created_at: "2026-07-07T03:55:34Z"
activated_at: "2026-07-07T03:55:34Z"
completed_at: "2026-07-07T03:55:34Z"
