schema_version: "0.2.0"
agentjob_id: AJ-P1-DISCOVERY-GATE-SMOKE-001
status: superseded
objective: Run the System Definition Discovery Gate on a sample framework-product change and produce a Requirements Discovery Record.
lifecycle_stage: implementation_initialization
superseded_by: AJ-SFADEV-12-DISCOVERY-GATE-SMOKE-001
supersession_reason: >
  The original smoke AgentJob was intentionally narrow and did not include
  enough closeout authority for Director Decision, memory preflight, completion,
  handoff, generated derivative, and program-state updates. The SFADEV-12
  packet supersedes it with an executable bounded closeout surface.
role_binding:
  role_id: user_wants_elicitor
  binding_type: one_job_provisional_role
  authority_scope: discovery gate smoke validation
  expires_with_agentjob: true
subject_system_id: Sys4AI
subject_layer: framework_product
required_inputs:
  - User or Director-provided system change request.
allowed_reads:
  - PRDs/**
  - Sys4AI/templates/system_definition/**
  - .agents/skills/system-definition-interview-context-45/**
allowed_writes:
  - Sys4AI/control_records/system_definition/**
  - Sys4AI/registries/discovery_record_registry.csv
forbidden_actions:
  - Create a baselined USRD automatically.
  - Treat candidate requirements as approved requirements.
  - Treat generated derivatives as canonical.
expected_outputs:
  - requirements-discovery-record.md
  - discovery_record_registry.csv row
validators:
  - python -m sys_for_ai.cli validate-discovery-record <path>
  - python -m sys_for_ai.cli validate-discovery-records registries/discovery_record_registry.csv
completion_evidence_required:
  - RDR path
  - validation status
  - open issue count
memory_preflight:
  required: true
  minimum_queries:
    - discovery gate smoke
    - requirements discovery record
authority_boundary:
  may_create_rdr: true
  may_create_usrd: false
  may_promote_candidate_requirements: false
  may_promote_generated_derivatives: false
handoff_policy:
  create_handoff_when:
    - smoke RDR is produced
    - subject layer cannot be classified
stop_conditions:
  - Subject layer cannot be classified.
  - Existing source evidence conflicts with user request.
  - User asks to skip discovery without Director Decision Record.
