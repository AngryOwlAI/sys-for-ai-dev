agentjob_id: AJ-P1-CONTINUE-SKILLS-001
schema_version: 0.2.0
status: pending
objective: >
  Add governed continuation and source-first memory skill surfaces across the
  active development runtime, compatibility shim layer, and portable product
  scaffold without collapsing their authority boundaries.
lifecycle_stage: implementation_initialization
role_binding:
  role_id: skill_surface_engineer
  binding_type: one_job_provisional_role
  authority_scope: Sys4AI Phase 1 scaffold
  expires_with_agentjob: true
required_inputs:
  - implementation_plans/Sys4AI-dev_memory_continue_self_hosting_implementation_plan.md
  - temp_handoff/handoff-0009.md
  - Sys4AI/docs/skill_integration_policy.md
  - Sys4AI/registries/skill_registry.csv
  - Sys4AI/skills/core_skill_manifest.yaml
allowed_reads:
  - PRDs/**
  - implementation_plans/**
  - temp_handoff/handoff-0009.md
  - .agents/skills/**
  - .codex/skills/**
  - Sys4AI/**
allowed_writes:
  - .agents/skills/continue/**
  - .agents/skills/source-first-memory/**
  - .codex/skills/continue/**
  - .codex/skills/source-first-memory/**
  - Sys4AI/skills/core/continue/**
  - Sys4AI/skills/core/source-first-memory/**
  - Sys4AI/skills/core_skill_manifest.yaml
  - Sys4AI/docs/skill_integration_policy.md
  - Sys4AI/docs/generated/**
  - Sys4AI/registries/**
  - Sys4AI/sys_for_ai/validators.py
  - Sys4AI/sys_for_ai/cli.py
  - Sys4AI/Makefile
  - Sys4AI/control_records/agentjobs/AJ-P1-CONTINUE-SKILLS-001.yaml
  - Sys4AI/tests/**
  - temp_handoff/handoff-0010.md
generated_paths:
  - Sys4AI/docs/generated/**
forbidden_paths:
  - LICENSE
  - NOTICE
  - .git/**
  - .venv/**
  - Sys4AI/.venv/**
  - Sys4AI/docs/generated/** as canonical source
forbidden_actions:
  - Modify repository LICENSE or NOTICE.
  - Treat compatibility shims as independent skill authority.
  - Make product scaffold skills depend on Codex-specific behavior.
  - Execute more than one AgentJob in one /continue invocation.
  - Mutate activated control records instead of superseding them.
memory_preflight:
  required: true
  minimum_queries:
    - continue skill surface
    - source-first-memory skill surface
  required_evidence:
    - latest handoff inspection
    - implementation plan Phase 9 inspection
expected_outputs:
  - Active .agents continuation and source-first memory skills.
  - .codex compatibility shims pointing to .agents runtime skills.
  - Portable product scaffold skills under Sys4AI/skills/core.
  - Skill registry and manifest updates.
  - Refreshed generated derivatives affected by registry updates.
  - Phase 9 temp handoff for the next continuation turn.
  - Validation proving skill surfaces and boundaries.
validators:
  - cd Sys4AI && make validate-skills
  - cd Sys4AI && make validate-agentjob-boundaries validate-check-diff
  - cd Sys4AI && make validate
completion_evidence_required:
  - changed_artifacts
  - command_results
  - validation_status
handoff_policy:
  create_handoff_when:
    - implementation remains incomplete
    - next AgentJob is recommended
authority_boundary:
  may_modify_product_scaffold: true
  may_modify_canonical_prds: false
  may_promote_generated_derivatives: false
  may_change_runtime_skill_authority: true
  runtime_skill_surface: .agents/skills
  compatibility_skill_surface: .codex/skills
  product_scaffold_skill_surface: Sys4AI/skills/core
stop_conditions:
  - Required plan or handoff source cannot be inspected.
  - Runtime skill and compatibility shim authority cannot be separated.
  - Product scaffold skills require Codex-specific behavior.
  - Existing skill validation or registry graph validation would be broken.
  - More than one AgentJob is required.
  - Required write is outside allowlist.
