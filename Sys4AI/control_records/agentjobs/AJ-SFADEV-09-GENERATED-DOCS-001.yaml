agentjob_id: AJ-SFADEV-09-GENERATED-DOCS-001
schema_version: 0.2.0
status: completed
objective: >
  Generate or stub generated derivative docs for new registries, roles,
  artifact contracts, layers, and core skills without promoting generated
  pages to source authority.
lifecycle_stage: implementation_initialization
role_binding:
  role_id: documentation_librarian
  binding_type: registered_role
  authority_scope: all-recommendations generated docs and derivative governance
  expires_with_agentjob: true
required_inputs:
  - implementation_plans/Sys4AI-dev_all_recommendations_implementation_plan.md
  - implementation_plans/self_hosting_boundary_decision_record.md
  - Sys4AI/control_records/program_state.yaml
  - Sys4AI/control_records/handoffs/HANDOFF-SFADEV-08-CORE-SKILLS-BATCH-2-001.yaml
  - temp_handoff/handoff-0019.md
  - Sys4AI/registries/derivative_registry.csv
  - Sys4AI/registries/source_registry.csv
  - Sys4AI/sys_for_ai/derivative_generation.py
allowed_reads:
  - implementation_plans/**
  - PRDs/**
  - temp_handoff/**
  - Sys4AI/registries/**
  - Sys4AI/docs/generated/**
  - Sys4AI/sys_for_ai/derivative_generation.py
  - Sys4AI/sys_for_ai/derivatives/**
  - Sys4AI/sys_for_ai/registry_io.py
  - Sys4AI/sys_for_ai/cli.py
  - Sys4AI/control_records/**
  - Sys4AI/tests/**
allowed_writes:
  - Sys4AI/docs/generated/registry_catalog/**
  - Sys4AI/docs/generated/system_layers/**
  - Sys4AI/docs/generated/artifact_contracts/**
  - Sys4AI/docs/generated/core_skills/**
  - Sys4AI/docs/generated/roles/role-governance-summary.md
  - Sys4AI/docs/generated/configuration_control/**
  - Sys4AI/registries/derivative_registry.csv
  - Sys4AI/registries/source_registry.csv
  - Sys4AI/registries/control_record_registry.csv
  - Sys4AI/registries/agentjob_registry.csv
  - Sys4AI/registries/director_decision_registry.csv
  - Sys4AI/registries/completion_receipt_registry.csv
  - Sys4AI/registries/handoff_registry.csv
  - Sys4AI/registries/memory_preflight_receipt_registry.csv
  - Sys4AI/sys_for_ai/derivative_generation.py
  - Sys4AI/sys_for_ai/cli.py
  - Sys4AI/Makefile
  - Sys4AI/control_records/director_decisions/DDR-SFADEV-09-GENERATED-DOCS-001.yaml
  - Sys4AI/control_records/agentjobs/AJ-SFADEV-09-GENERATED-DOCS-001.yaml
  - Sys4AI/control_records/memory_preflights/MEMPREFLIGHT-SFADEV-09-GENERATED-DOCS-001.yaml
  - Sys4AI/control_records/completions/RECEIPT-SFADEV-09-GENERATED-DOCS-001.yaml
  - Sys4AI/control_records/handoffs/HANDOFF-SFADEV-09-GENERATED-DOCS-001.yaml
  - Sys4AI/control_records/program_state.yaml
  - Sys4AI/tests/test_agentjob_boundaries.py
  - Sys4AI/tests/test_program_state.py
  - Sys4AI/tests/test_self_hosting_acceptance.py
  - temp_handoff/handoff-0020.md
generated_paths:
  - Sys4AI/docs/generated/registry_catalog/**
  - Sys4AI/docs/generated/system_layers/**
  - Sys4AI/docs/generated/artifact_contracts/**
  - Sys4AI/docs/generated/core_skills/**
  - Sys4AI/docs/generated/roles/role-governance-summary.md
  - Sys4AI/docs/generated/configuration_control/**
forbidden_paths:
  - LICENSE
  - NOTICE
  - .git/**
  - .venv/**
  - Sys4AI/.venv/**
  - PRDs/**
  - Sys4AI/docs/generated/** as canonical source
stop_conditions:
  - A generated page lacks derivative metadata.
  - A generated page lacks derivative registry trace.
  - A generated derivative row is marked canonical.
  - A required write is outside the AJ-09 allowlist.
  - More than one all-recommendations AgentJob is required.
forbidden_actions:
  - Mark generated docs canonical.
  - Treat generated derivatives as source authority.
  - Execute more than one all-recommendations AgentJob in one continuation invocation.
memory_preflight:
  required: true
  minimum_queries:
    - generated docs and derivative governance
    - generated derivative docs for registries roles artifact contracts layers and core skills
  required_evidence:
    - self-hosting boundary decision record inspection
    - latest controlled handoff inspection
    - all-recommendations plan AJ-09 inspection
    - derivative registry inspection
expected_outputs:
  - Generated governance summary docs for registries, system layers, artifact contracts, core skills, and role governance.
  - Derivative registry rows for the new generated pages.
  - Source registry rows needed for registry-catalog trace completeness.
  - Existing configuration-control generated pages resynchronized after registry updates.
  - Validator and CLI coverage for deterministic generated governance docs.
  - Completion receipt and handoff evidence.
validators:
  - cd Sys4AI && make validate-generated-derivatives
  - cd Sys4AI && make generate-governance-docs
  - cd Sys4AI && make validate-check-diff
  - cd Sys4AI && make validate
completion_evidence_required:
  - changed_artifacts
  - command_results
  - validation_status
  - residual_risk
handoff_policy:
  create_handoff_when:
    - generated docs and derivative governance complete
    - next AgentJob is recommended
authority_boundary:
  may_modify_generated_derivatives: true
  may_modify_derivative_registry: true
  may_modify_derivative_generation_code: true
  may_modify_source_registry_for_trace_rows: true
  may_modify_canonical_prds: false
  may_promote_generated_derivatives: false
created_at: "2026-07-07T05:19:36Z"
activated_at: "2026-07-07T05:19:36Z"
completed_at: "2026-07-07T05:19:36Z"
