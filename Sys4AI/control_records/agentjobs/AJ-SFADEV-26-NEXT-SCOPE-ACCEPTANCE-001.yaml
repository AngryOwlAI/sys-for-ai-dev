  - Hide failed validation.
  - Promote sub-PRDs or generated derivatives.
  - Mark future Phase 3 work as completed.
  - Execute a second AgentJob in the same /continue packet.
expected_outputs:
  - Director Decision authorizing exactly one WS-26 AgentJob.
  - Final next-scope acceptance report.
  - Requirement-by-requirement plan completion audit.
  - Completion receipt and handoff.
  - Program state closed with no active AgentJob or Director Decision.
  - Registry rows for the WS-26 artifacts.
validators:
  - make validate-dev-skills
  - make validate-product-scaffold CHECK_DIFF_AGENTJOB=AJ-SFADEV-26-NEXT-SCOPE-ACCEPTANCE-001
  - make validate CHECK_DIFF_AGENTJOB=AJ-SFADEV-26-NEXT-SCOPE-ACCEPTANCE-001
  - cd Sys4AI && make doctor
  - cd Sys4AI && make validate-discovery-records
  - cd Sys4AI && make validate-prd-modules
  - cd Sys4AI && make validate-walking-skeleton
  - cd Sys4AI && make validate-target-package-smoke
  - cd Sys4AI && make validate-requirement-trace
  - cd Sys4AI && make validate-registry-graph
  - cd Sys4AI && make validate-generated-derivatives
  - cd Sys4AI && make validate CHECK_DIFF_AGENTJOB=AJ-SFADEV-26-NEXT-SCOPE-ACCEPTANCE-001
  - cd Sys4AI && .venv/bin/python -m unittest discover -s tests
  - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli validate-check-diff --agentjob AJ-SFADEV-26-NEXT-SCOPE-ACCEPTANCE-001 --json
  - git diff --check
completion_evidence_required:
  - memory preflight receipt
  - final acceptance report
  - completion audit
  - final validation output
  - closeout receipt
  - handoff naming next recommended phase
memory_preflight:
  required: true
  minimum_queries:
    - next-scope final acceptance and handoff
    - final validation for sub-PRD routing
  required_evidence:
    - latest handoff inspection
    - program state inspection
    - next-scope implementation plan inspection
    - prior workstream registry inspection
    - PRD authority index inspection
authority_boundary:
  may_validate_plan_completion: true
  may_write_acceptance_report: true
  may_write_completion_audit: true
  may_update_tests_for_current_control_state: true
  may_refresh_generated_derivatives: true
  may_modify_requirements: false
  may_promote_subprds: false
  may_mark_phase3_complete: false
handoff_policy:
  create_handoff_when:
    - final acceptance report exists
    - completion audit proves WS-15 through WS-26 evidence
    - final validation passes
    - program state has no active AgentJob
stop_conditions:
  - Any blocking validator fails.
  - Any required WS-15 through WS-25 evidence is missing.
  - Any sub-PRD authority conflict remains unresolved.
  - A write outside the allowed boundary is required.
