selected_route:
  route_id: accept_mixed_G_07_observed_development_host_profile
  route_name: Accept exact observed capabilities and limitations without production or permission promotion
  rationale: The eight required interfaces have current source-backed probe evidence and explicit capability states. Four are verified available three remain conditional and target runtime is verified unavailable. This satisfies G-07's capability-and-limitation exit criterion while retaining fail-closed permissions and target-runtime boundaries.
  immediate_effect: The codex_app_reference profile becomes verified_G_07 version 1.0.0 until its freshness horizon or an earlier review trigger. Only verified-available current interfaces may support later host-dependent claims and every consuming transaction still requires independent authority and permission.
rejected_routes:
- route_id: leave_all_interfaces_unknown
  reason: Current retained probes support narrower evidence-backed states and keeping every interface unknown would discard observable evidence.
- route_id: mark_all_interfaces_verified_available
  reason: Tools network task mutation and sub-agents are conditional while target runtime is absent.
- route_id: infer_production_readiness_or_operational_authority
  reason: G-07 host conformance is independent from target deployment operations monitoring incident maintenance release and G-10 evidence.
- route_id: treat_capability_as_permission
  reason: Platform host project and transaction constraints remain above the task objective and values or goals cannot grant authority.
- route_id: close_all_remaining_G_10_evidence_in_TX22
  reason: The host probe packet does not supply quantitative strategic external independent confidential rotated operational stakeholder or domain evidence.
