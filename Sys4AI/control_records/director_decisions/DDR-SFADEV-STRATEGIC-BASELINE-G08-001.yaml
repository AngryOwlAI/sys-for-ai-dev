rollback_and_review:
  rollback_class: activating_strategic_baseline_decision
  rollback_scope: >
    Before shared-baseline publication, revert the complete TX-18 decision,
    Phase 0 status, trace, program-state, validator, registry, receipt, handoff,
    and generated-reader packet together. After publication or downstream
    dependency, do not delete or mutate this accepted decision; create a new
    accountable human supersession decision with impact and rollback evidence.
  supersession_rule: >
    Any change to approved wording, stable IDs, precedence, authority boundary,
    approval principal, or content status requires explicit impact analysis and
    an accountable human Director Decision naming this record as superseded.
  review_triggers:
    - material change to beneficiaries product scope host strategy lifecycle authority model or risk posture
    - evidence that approved wording is ambiguous unsafe infeasible or inconsistent with stakeholder intent
    - new law mandatory policy safety security privacy compliance or permission constraint
    - new adverse safety evaluation incident or rollback failure
    - proposal to expand autonomy permissions production maturity or operational authority
  expiry: none; remains current until explicitly superseded
