rejected_routes:
  - route_id: reject_exact_strategic_baseline
    reason: The accountable human principal selected approval rather than rejection after reviewing the TX-17 evidence and limitations.
  - route_id: request_revision_before_approval
    reason: The accountable human principal did not request wording revision; future material changes require explicit supersession.
  - route_id: infer_approval_from_TX17_validation
    reason: Structural and behavioral validation cannot substitute for accountable human approval; the direct human instruction is the approval evidence.
  - route_id: model_self_approval
    reason: A model identity has no authority to approve its purpose vision values permissions evaluation standard or acceptance.
  - route_id: approve_and_promote_to_production
    reason: G-08 strategic approval is independent from G-07 host verification production readiness operational authority and final G-10 acceptance.
  - route_id: start_TX19_inside_TX18
    reason: The transaction backlog and closeout rule require TX-18 validation commit push receipt and handoff before derivative-module regeneration begins.
