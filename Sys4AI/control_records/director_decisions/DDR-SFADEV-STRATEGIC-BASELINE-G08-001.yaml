selected_route:
  route_id: approve_exact_strategic_baseline_with_bounded_TX17_acceptance
  route_name: approve the reviewed Sys4AI vision and core values without expanding capability or authority claims
  rationale: >
    The candidate strategic content is field-complete, traceable, bounded by
    explicit precedence and non-self-approval rules, and supported by the TX-17
    structural and local behavioral safety packet. The accountable human
    principal has directly selected approval after receiving the closeout
    evidence and limitations. Approval therefore closes G-08 for the exact
    content while all capability, host, production, operational, stakeholder,
    and domain-evidence dimensions remain independent.
  immediate_effect: >
    SFA-VISION-001 and SFA-VALUE-001 through SFA-VALUE-008 become the approved
    version 1.0 Sys4AI strategic baseline. Their Phase 0 requirement family
    becomes active. TX-19 becomes eligible only after TX-18 validation, commit,
    push, completion receipt, and handoff evidence exist.
