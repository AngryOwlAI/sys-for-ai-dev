director_decision_id: DDR-SFADEV-STRATEGIC-BASELINE-001
schema_version: 0.1.0
decision_status: completed
created_at: "2026-07-09T23:38:26Z"
completed_at: "2026-07-09T23:38:26Z"
director_role: system_director
human_authorization:
  principal_name: Alex Omegapy
  principal_role: repository_maintainer_and_product_owner
  authority_basis: >
    The accountable human repository maintainer and product owner issued the
    current task instruction to perform WS-02 after reviewing the completed
    TX-01-RDR closeout and its stated human-authorization gate.
  approval_evidence: >
    Human-issued Codex task instruction dated 2026-07-09: execute the logical
    next step WS-02 and create the human-authorized identity and execution-model
    Director Decision.
  approval_scope:
    - composite Sys4AI identity and runtime-actor model
    - post-retraction execution-model route
    - portability and host-profile boundary
    - historical AgentJob and /continue disposition
    - Phase 2 addendum route
    - human-reserved decisions
    - default reflection-depth bound
  model_self_approval: false
decision_context:
  trigger: strategic_baseline_identity_and_execution_model_gate
  transaction_id: TX-02-DECISION
  workstream_id: WS-02
  gate_id: G-02
  program_state_id: SYS4AI-PROGRAM-STATE-001
  latest_handoff_id: HANDOFF-SFADEV-26-NEXT-SCOPE-ACCEPTANCE-001
  plan_source_id: SRC-STRATEGIC-BASELINE-MIGRATION-PLAN
  requirements_discovery_record_id: RDR-SFADEV-STRATEGIC-BASELINE-001
  requirements_discovery_source_id: SRC-RDR-STRATEGIC-BASELINE-001
  baseline_receipt_source_id: SRC-STRATEGIC-BASELINE-WS00-RECEIPT
  reviewed_head_commit: 217c0ec5259c57313899d4141d07149ef3979e25
  capability_retraction_commit: 15a9b17635db2cc76d3f1003f60ea20e46a4e313
  user_request: >
    Implement WS-02 as the logical next step after the completed strategic
    baseline migration RDR.
  observed_evidence:
    - The validated RDR routes only to WS-02 and keeps all candidate requirements noncanonical.
    - Commit 15a9b17 removed the /continue, AgentJob-authoring, control-loop, CLI, Make, and runtime-test surfaces.
    - TX-00 recorded 109 active-but-stale files and 1049 stale references while preserving 176 historical files.
    - Current canonical and controlled PRD surfaces still contain execution semantics that conflict with the observed post-retraction runtime.
    - The requirement trace represents historical implementation evidence but does not yet separate capability, evidence, approval, validation, and lifecycle state.
    - The current program state has no active Director Decision or AgentJob and retains legacy execution vocabulary pending migration.
    - Source-first memory status passed with pending-hash warnings; routing claims were verified against the RDR, plan, program state, registries, and Git evidence.
  memory_preflight_evidence:
    status: PASS_WITH_WARNINGS
    commands:
      - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli memory status --json
      - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli memory lookup RDR-SFADEV-STRATEGIC-BASELINE-001 --json
      - cd Sys4AI && .venv/bin/python -m sys_for_ai.cli memory lookup implementation_plans/Sys4AI-dev_strategic_baseline_migration_full_implementation_plan.md --json
    authority_rule: Memory results were navigation only; registered source paths and rows determined the decision evidence.
selected_route:
  route_id: route_2_harness_neutral_bounded_execution
  route_number: 2
  route_name: harness-neutral bounded execution
  rationale: >
    Route 2 preserves bounded authorization, resumability, current-state
    resolution, validation, closeout, handoff, cancellation, and escalation
    obligations without claiming that removed AgentJob or /continue runtime
    mechanics still exist. It is the simplest route that remains truthful,
    portable across hosts, compatible with Codex as the first reference host,
    and reversible through explicit supersession.
  selected_role: system_director
  creates_agentjob_id: null
  selected_agentjob_id: null
  immediate_effect: >
    G-02 is accepted. Later workstreams may enter their own bounded transactions
    when their stated entry gates are met; this decision does not complete or
    waive any downstream transaction.
identity_model:
  composite_system: Sys4AI
  objects:
    - object_id: sys4ai_framework_product
      name: Sys4AI Framework Product
      definition: >
        The governed requirements, methods, roles, skills, contracts,
        templates, registries, validators, policies, and reference
        implementation used to create and steward target systems.
    - object_id: sys4ai_meta_agent_runtime
      name: Sys4AI Meta-Agent Runtime
      definition: >
        The executable AI-agent identity that applies the framework only under
        bounded human and host authorization and never self-authorizes purpose,
        values, permissions, evaluation standards, or authority.
    - object_id: codex_app_reference_host
      name: Codex App Host Harness
      definition: >
        The initial reference host supplying model execution, conversation,
        tools, workspace, task state, cancellation, and other verified host
        capabilities. It is not the source of Sys4AI purpose or values.
    - object_id: target_ai_agent_or_system
      name: Target AI Agent or Target Agentic System
      definition: >
        A separate system of interest created or stewarded through Sys4AI with
        its own purpose, authority, data, approval, and operational boundary.
  framework_and_runtime_relationship: >
    Sys4AI comprises both the governed framework product and the executable
    Meta-Agent Runtime; neither object erases the authority boundary of the
    other.
  target_agents_and_agentic_systems_are_separate_systems_of_interest: true
  target_system_rule: >
    Each target AI agent and each target agentic system is governed as a system
    of interest separate from Sys4AI and from other targets, including its own
    purpose, authority, data, approval, and operational boundaries.
runtime_actor_model:
  subject_layer_dimension: >
    Classifies development_system, framework_product, target_system_template,
    target_system_instance, and derivative_surface artifacts.
  runtime_actor_dimension: >
    Separately identifies the human principal, host harness, Meta-Agent
    Runtime, delegated role actor, target runtime, verifier, or operator acting
    in a transaction.
  dimensions_are_independent: true
  new_meta_agent_authority_layer_created: false
  representation_rule: >
    Use runtime_actor with the existing layer model. A new authority layer
    requires a demonstrated representation gap and a separate Director
    Decision.
execution_model:
  portable_vocabulary:
    execution_authorization: Explicit human or delegated authority for a bounded action set.
    permission_envelope: Allowed reads, writes, tools, external actions, data, time, and resource limits.
    execution_transaction: Resumable bounded work unit with inputs, outputs, state, validators, stop rules, and evidence.
    current_state_resolution: Source-backed determination of the state from which work resumes.
    closeout_evidence: Validation, changed artifacts, acceptance, rollback, and completion data.
    handoff_evidence: State needed for another authorized actor or host session to resume safely.
    continuation_evidence: Evidence establishing the next permitted transition.
    cancellation_state: Requested, acknowledged, safe-stop, rolled-back, or incomplete cancellation state.
    escalation_state: Condition, responsible human authority, and required decision for blocked work.
  execution_states:
    - proposed
    - authorized
    - active
    - blocked
    - cancelled
    - completed
    - accepted
    - superseded
  agentjob_disposition:
    evidence_status: historical
    active_framework_status: retired
    optional_profile_status: not_approved
    rule: >
      Existing AgentJob records remain immutable historical evidence. AgentJob
      is not the portable transaction contract and must not be treated as a
      current runtime capability.
  continue_disposition:
    evidence_status: historical
    active_framework_status: retired
    optional_host_command_status: not_approved
    rule: >
      Existing /continue references remain immutable historical evidence.
      /continue is not a required framework command and may become an optional
      host command only through a later host-profile decision and verification.
  removed_runtime_restoration_authorized: false
  no_implicit_restoration_rule: >
    This decision does not authorize recreating deleted continue or
    AgentJob-authoring skills, restoring Sys4AI/sys_for_ai/control_loop,
    re-adding removed CLI or Make targets, weakening absence tests, or treating
    historical control records as proof of current capability.
portability_boundary:
  portable_contract_may_name_codex: false
  host_profiles_may_name_codex: true
  codex_status: initial_reference_host_pending_G_07_verification
  required_behavior: >
    Portable semantics define obligations and states. A host profile maps them
    to verified host capabilities, permissions, limitations, degraded modes,
    and cancellation behavior. Unknown required capabilities fail closed.
  host_authority_precedence: >
    Host platform policy, system and developer instructions, permissions, and
    human approvals remain binding and cannot be expanded by framework goals or
    values.
phase_2_disposition:
  selected_route: controlled_addendum
  selected_path: PRDs/Sys4AI_phase-2_strategic_baseline_addendum.md
  rationale: >
    An addendum preserves the accepted Phase 2 source and draft evidence with
    the smallest authority change while carrying new portable execution,
    strategic-intent, host-profile, test, and package obligations.
  existing_phase_2_mutable: false
  successor_route_rejected_for_this_migration: true
human_reserved_decisions:
  - purpose and product identity approval
  - vision and core-values approval
  - authority hierarchy and delegation limits
  - permission grants and expansions
  - evaluation standards and acceptance thresholds
  - production promotion and release acceptance
  - canonical baseline supersession
  - reflection-depth expansion beyond the default
  - restoration of removed runtime capabilities
reflection_control:
  maximum_default_depth: 1
  escalation_condition: >
    Any proposed reflection depth greater than one, recursive self-change, or
    change to identity, permissions, evaluator, acceptance criteria, or
    authority hierarchy must stop and escalate to an accountable human.
  expansion_requirements:
    - separate threat model
    - explicit reason and maximum depth
    - bounded permission envelope and termination condition
    - independent evaluator and holdout evidence
    - rollback plan and emergency stop
    - explicit human approval
security_and_permission_analysis:
  conclusion: >
    Route 2 reduces authority ambiguity by separating authorization from
    execution, using least privilege, denying implicit permission expansion,
    reserving consequential approvals to humans, and requiring explicit stop,
    cancellation, escalation, isolation, verification, and rollback evidence.
  residual_risks:
    - Host capabilities and permissions remain unverified until G-07.
    - Portable contracts and validators do not yet exist and must fail closed until implemented.
    - Existing active surfaces remain semantically stale until the authorized migration transactions complete.
    - Independent evaluation and production thresholds remain later human gates.
portability_analysis:
  conclusion: >
    Route 2 is host-neutral because portable field names describe obligations
    rather than Codex UI, command, or task mechanics. Codex-specific mappings
    are isolated in a reference-host profile and can be replaced without
    redefining framework purpose or transaction semantics.
  compatibility_rule: >
    Historical AgentJob and /continue artifacts remain readable for provenance.
    New active artifacts use the approved portable vocabulary. Adapters, if
    later approved, must declare themselves optional profiles and cannot become
    canonical requirement authority.
phase_and_authority_effects:
  resolved_open_questions:
    - OPEN-SBM-001
    - OPEN-SBM-012
    - OPEN-SBM-014
    - OPEN-SBM-017
    - OPEN-SBM-018
    - OPEN-SBM-020
  deferred_open_questions:
    - OPEN-SBM-002 through OPEN-SBM-011 require strategic-intent elicitation and approval.
    - OPEN-SBM-013 requires an operations and maintenance cadence decision.
    - OPEN-SBM-015 and OPEN-SBM-016 require G-07 host verification.
    - OPEN-SBM-019 requires G-04 role and artifact-contract decisions.
    - OPEN-SBM-021 requires WS-13 production-promotion thresholds.
    - OPEN-SBM-022 requires target-specific retirement obligations.
  authorizes_in_principle:
    - program-state migration
    - role and runtime-actor migration
    - artifact and policy migration
    - registry and trace migration
    - validator and walking-skeleton migration
    - target-package migration
    - Codex reference-host profile development
    - Phase 2 controlled addendum development
  does_not_accept_or_complete:
    - candidate vision or core-values wording
    - canonical Phase 0 or Phase 1 edits
    - artifact and interface contracts
    - Codex host capability claims
    - portable execution implementation
    - Phase 2 addendum content
    - trace migration or validator implementation
    - production readiness or final migration acceptance
rejected_routes:
  - route_id: route_1_retain_unimplemented_agentjob_and_continue_requirements
    reason: >
      It would keep canonical requirements coupled to removed implementation,
      preserve misleading active capability claims, and postpone the semantic
      conflict rather than resolve it.
  - route_id: route_3_retire_bounded_execution_concepts_completely
    reason: >
      It would discard necessary authorization, scope, resumability,
      current-state, closeout, handoff, cancellation, and escalation controls.
  - route_id: route_4_restore_removed_implementation
    reason: >
      It would reverse an intentional capability retraction without a separate
      threat model, implementation plan, tests, rollback evidence, and explicit
      product-owner authorization.
  - route_id: create_meta_agent_authority_layer_now
    reason: >
      The independent runtime_actor dimension represents execution identity
      without introducing a new authority class or creating an authority path
      for model self-approval.
  - route_id: phase_2_successor_prd_for_this_migration
    reason: >
      A successor would create a broader authority change than needed; the
      controlled addendum preserves accepted evidence and isolates the delta.
  - route_id: implement_downstream_work_in_this_decision_transaction
    reason: >
      WS-03 through WS-16 retain their own entry gates, bounded writes,
      validation, acceptance, rollback, commit, and push obligations.
supersession_and_compatibility:
  - prior_id: SFA-EDR-SELFHOST-001
    prior_source_id: SRC-SELFHOST-BOUNDARY-DECISION
    effect: scoped_supersession
    details: >
      The layer, memory-navigation, historical-record, derivative, and
      host-portability rules remain controlling. Rule 4 and the continuation
      consequence are superseded: /continue and AgentJob are historical rather
      than active required execution semantics.
  - prior_id: DDR-P1-SELFHOST-001
    prior_source_id: SRC-DDR-SELFHOST-001
    effect: scoped_supersession
    details: >
      The completed decision remains immutable historical evidence. Its
      implement_continue_loop_kernel route and AgentJob creation authority have
      no current operational authority after 15a9b17 and are superseded for
      active execution-model decisions.
historical_plan_rule: >
  Completed implementation plans and their receipts remain immutable
  historical evidence. Where their commands, routes, or runtime claims
  conflict with this accepted decision and the post-15a9b17 baseline, they
  have no current operational authority and must not route new work.
authoritative_surfaces:
  immediate_order:
    - this accepted Director Decision for G-02 identity and execution-model clauses
    - current canonical or controlled PRDs for requirements not yet migrated
    - controlled registries, schemas, policies, and validated control records
    - strategic baseline migration plan for transaction routing only
    - derivative modules and generated documentation as noncanonical navigation only
  post_migration_rule: >
    Approved canonical PRDs own normative requirements; controlled contracts,
    registries, policies, and host profiles own their declared interfaces and
    state; this decision owns the selected identity and execution route;
    generated and historical artifacts do not regain current operational
    authority.
authority_boundary:
  human_authority_recorded: true
  opens_gate_G_02: true
  authorizes_downstream_transactions_in_principle: true
  may_execute_downstream_without_entry_gates: false
  may_modify_canonical_prds_in_this_transaction: false
  may_promote_candidate_requirements_automatically: false
  may_approve_vision_or_values_automatically: false
  may_create_agentjob: false
  may_restore_removed_runtime_surfaces: false
  may_treat_historical_evidence_as_current_capability: false
  may_add_new_authority_layer: false
  may_expand_host_permissions: false
  may_modify_accepted_phase_2: false
  may_create_phase_2_addendum_in_later_G_06_transaction: true
  may_refresh_generated_derivatives_in_this_transaction: true
  required_downstream_controls:
    - one bounded execution transaction at a time
    - stated entry gate and explicit allowed writes
    - source-backed current-state resolution
    - validation, semantic review, rollback, closeout, and handoff evidence
    - commit and push or equivalent shared-baseline evidence before the next transaction
rollback_and_review:
  before_downstream_dependency: >
    Replace this record only through a new accepted superseding Director
    Decision; do not mutate this completed record in place.
  after_downstream_dependency: >
    Require impact analysis across requirements, architecture, permissions,
    roles, contracts, registries, trace, validators, host profiles, target
    packages, walking-skeleton evidence, and generated derivatives before a
    superseding decision is accepted.
  review_triggers:
    - evidence that runtime_actor cannot represent the Meta-Agent Runtime safely
    - material Codex host capability or permission change
    - proposal to restore AgentJob, /continue, or deleted control-loop surfaces
    - reflection-depth expansion or recursive self-change
    - Phase 2 addendum proves insufficient and a successor is proposed
    - material security, privacy, evaluation, or operational incident
  expiry: none; remains controlling until explicitly superseded
