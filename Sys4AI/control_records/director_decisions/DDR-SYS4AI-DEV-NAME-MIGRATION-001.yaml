director_decision_id: DDR-SYS4AI-DEV-NAME-MIGRATION-001
schema_version: 0.1.0
decision_status: completed
created_at: "2026-07-07T12:00:00Z"
completed_at: "2026-07-07T12:00:00Z"
director_role: system_director
decision_context:
  trigger: Sys4AI-dev name migration
  program_state_id: SYS4AI-PROGRAM-STATE-001
  previous_handoff_id: HANDOFF-SFADEV-10-END-TO-END-ACCEPTANCE-001
  memory_preflight_receipt_id: MEMPREFLIGHT-SYS4AI-DEV-NAME-MIGRATION-001
  implementation_plan: user_approved_sys4ai_rename_migration_plan
selected_route:
  route_id: implement_sys4ai_name_migration
  rationale: >
    The project identity has changed from the legacy hyphenated names to
    Sys4AI and Sys4AI-dev. The migration must update public names, tracked
    paths, source registries, generated derivatives, package metadata, and
    current validation surfaces while preserving historical SFADEV control
    identifiers as completed evidence.
  selected_role: svc_documentation_surface_architect
  creates_agentjob_id: AJ-SYS4AI-DEV-NAME-MIGRATION-001
rejected_routes:
  - route_id: blind_global_replacement
    reason: The Python import package sys_for_ai and historical SFADEV IDs must remain stable.
  - route_id: rewrite_completed_control_ids
    reason: Completed control history is superseded by evidence rather than rewritten.
  - route_id: rename_outer_checkout_now
    reason: The local checkout and GitHub remote rename are external post-validation steps.
authority_boundary:
  may_create_agentjob: true
  may_update_public_project_identity: true
  may_move_product_scaffold_path: true
  may_update_package_metadata: true
  may_update_current_registries_and_schemas: true
  may_resynchronize_generated_derivatives: true
  may_add_rename_audit: true
  may_change_python_import_module: false
  may_rewrite_historical_control_ids: false
  may_rename_outer_checkout_or_remote: false
validators:
  - make validate-rename
  - make validate-dev-skills
  - make validate-product-scaffold
  - make validate
  - cd Sys4AI && make validate
  - cd Sys4AI && .venv/bin/python -m unittest discover -s tests
  - cd Sys4AI && .venv/bin/Sys4AI doctor
  - git diff --check
completion_evidence:
  completion_receipt_id: RECEIPT-SYS4AI-DEV-NAME-MIGRATION-001
  handoff_id: HANDOFF-SYS4AI-DEV-NAME-MIGRATION-001
  notes: Sys4AI and Sys4AI-dev name migration completed with validation evidence.
