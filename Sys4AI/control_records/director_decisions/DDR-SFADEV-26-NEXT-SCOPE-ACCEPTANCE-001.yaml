selected_route:
  route_id: close_next_scope_acceptance_packet
  rationale: >
    All prior next-scope workstreams have completion evidence. A bounded final
    acceptance packet can audit that evidence, run final validation, close the
    plan, and recommend the next scope without modifying requirements.
  selected_role: requirements_verifier
  creates_agentjob_id: AJ-SFADEV-26-NEXT-SCOPE-ACCEPTANCE-001
  selected_agentjob_id: AJ-SFADEV-26-NEXT-SCOPE-ACCEPTANCE-001
rejected_routes:
  - route_id: reopen_prior_workstreams
    reason: Prior workstreams have completed receipts and handoffs; reopening them would exceed WS-26 acceptance scope.
  - route_id: promote_subprds_during_acceptance
    reason: WS-25 explicitly kept all sub-PRDs as derivative drafts; promotion requires a later source-authority workflow.
  - route_id: begin_phase3_generation_in_same_packet
    reason: The self-hosting boundary and /continue contract allow at most one AgentJob per invocation.
  - route_id: mark_source_hash_backlog_complete
    reason: Source-hash hardening remains a known later-scope improvement, not a completed WS-26 item.
