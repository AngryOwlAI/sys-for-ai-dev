  program_state_id: SYS4AI-PROGRAM-STATE-001
  latest_handoff_id: HANDOFF-SFADEV-25-SUBPRD-PROMOTION-001
  user_request: >
    Continue implementing every workstream in the next-scope implementation plan
    one /continue task at a time.
  observed_evidence:
    - HANDOFF-SFADEV-25-SUBPRD-PROMOTION-001 recommends WS-26 final acceptance and handoff.
    - Sys4AI/control_records/program_state.yaml allows open_next_scope_acceptance_decision and blocks final acceptance without a Director Decision.
