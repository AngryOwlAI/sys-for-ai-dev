validators:
- validator_id: reviewed_trace_migration
  command_or_method: make validate-requirement-trace-migration
  blocking: true
  expected_evidence: All 214 generalized rows pass with exact legacy digest reconstruction and no provisional review state.
- validator_id: focused_trace_tests
  command_or_method: .venv/bin/python -m unittest tests.test_trace_schema_migration -v
  blocking: true
  expected_evidence: Atomic migration rollback counts review and retired-runtime negative tests pass.
- validator_id: current_trace_validation
  command_or_method: make validate-requirement-trace
  blocking: true
  expected_evidence: All 214 Phase 0 requirements remain uniquely traced and all evidence paths resolve.
- validator_id: aggregate_validation
  command_or_method: make validate at product and repository roots
  blocking: true
  expected_evidence: Product and development-system validation pass without entering TX-13 scope.
- validator_id: diff_integrity
  command_or_method: git diff --check
  blocking: true
  expected_evidence: No whitespace or patch-integrity errors.
stop_conditions:
- Count ID row-order or exact legacy reconstruction parity fails.
- Any provisional lifecycle applicability verification evidence or semantic-review state remains.
- Any row overstates implemented operational or verified capability.
- A blocking validator fails after TX-12-scoped repair is exhausted.
- Required work expands into TX-13 broader validators.
