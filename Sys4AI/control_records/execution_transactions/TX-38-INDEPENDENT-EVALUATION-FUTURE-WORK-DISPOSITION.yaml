validators:
- validator_id: focused_disposition_control
  command_or_method: cd Sys4AI && make validate-director-decisions validate-director-decision-registry validate-program-state validate-handoffs validate-handoff-registry
  blocking: true
  expected_evidence: G11-015 TX-38 state and handoff validate while TX-37 remains preserved.
- validator_id: independent_evaluation_boundary
  command_or_method: cd Sys4AI && make validate-independent-evaluation
  blocking: true
  expected_evidence: TX-37 protocol remains ready and no executed evaluation claim is introduced.
- validator_id: focused_semantic_tests
  command_or_method: cd Sys4AI && .venv/bin/python -m unittest tests.test_trace_semantics tests.test_independent_evaluation tests.test_self_hosting_acceptance
  blocking: true
  expected_evidence: Future-work disposition and protocol-not-executed boundaries fail closed.
- validator_id: aggregate_validation
  command_or_method: make validate at product and repository roots
  blocking: true
  expected_evidence: Product and development-system validation pass with generated readers current.
- validator_id: frozen_boundaries
  command_or_method: verify G11-014 TX-37 protocol receipt handoff TX-23 TX-25 and requirement trace hashes are unchanged
  blocking: true
  expected_evidence: Activated evidence and trace state remain byte-identical.
- validator_id: diff_integrity
  command_or_method: git diff --check
  blocking: true
  expected_evidence: No whitespace or patch-integrity errors.
stop_conditions:
- The human disposition is absent ambiguous or contradicted.
- Any independent evaluation production operational stakeholder domain permission or G-10 claim appears.
- Any prior activated record frozen baseline canonical PRD trace state or waiver changes.
- A blocking validator fails after bounded repair.
