expected_outputs:
- One controlled Phase 2 strategic-baseline addendum at the selected path.
- Updated PRD authority index plus source object-relationship and requirement-trace rows.
- Semantic validation of the addendum and generalized trace support for non-Phase-0 requirement sources.
- Exact preservation evidence for the accepted Phase 2 source and draft.
- Registered completion and a TX-15-only handoff.
validators:
- validator_id: focused_phase2_semantics
  command_or_method: make validate-prd-semantics validate-requirement-trace validate-requirement-trace-migration validate-registry-graph validate-strategic-intent validate-lifecycle-and-patterns validate-capability-migration
  blocking: true
  expected_evidence: Addendum markers trace rows source relationships and strategic boundaries pass.
- validator_id: phase2_preservation
  command_or_method: sha256 and git diff checks for the accepted Phase 2 source and draft
  blocking: true
  expected_evidence: SHA-256 values remain 98567cf4 and 9e290964 with zero diff.
- validator_id: focused_unit_tests
  command_or_method: .venv/bin/python -m unittest tests.test_prd_semantics tests.test_trace_semantics -v
  blocking: true
  expected_evidence: Addendum and generalized trace positive-negative probes pass.
- validator_id: product_unit_suite
  command_or_method: .venv/bin/python -m unittest discover -s tests
  blocking: true
  expected_evidence: All retained and new product tests pass.
- validator_id: aggregate_validation
  command_or_method: make validate at product and repository roots
  blocking: true
  expected_evidence: Product and development-system validation pass.
- validator_id: diff_integrity
  command_or_method: git diff --check
  blocking: true
  expected_evidence: No whitespace or patch-integrity errors.
stop_conditions:
- Either protected Phase 2 hash changes or either protected file has a Git diff.
- The addendum would claim G-08 approval operational capability production readiness or domain truth.
- Any existing reviewed trace row changes without exact evidence.
- A blocking validator fails after TX-14-scoped repair is exhausted.
- Required work expands into target-package or walking-skeleton implementation.
