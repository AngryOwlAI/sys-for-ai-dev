expected_outputs:
- A versioned generalized trace row contract that retains the legacy row shape during transition.
- A documented deterministic and reversible legacy-to-generalized mapping.
- A dry-run validator that preserves row trace-ID requirement-ID and source-hash parity without writing data.
- Focused positive and negative schema and migration tests.
- Registered completion handoff and validation evidence that routes only to TX-12.
validators:
- validator_id: trace_migration_dry_run
  command_or_method: make validate-requirement-trace-migration
  blocking: true
  expected_evidence: All 214 live rows validate in memory with row trace-ID and requirement-ID parity and the legacy source hash remains unchanged.
- validator_id: focused_trace_tests
  command_or_method: .venv/bin/python -m unittest tests.test_trace_schema_migration -v
  blocking: true
  expected_evidence: Positive negative independence reversibility header drift and no-write tests pass.
- validator_id: current_trace_validation
  command_or_method: make validate-requirement-trace
  blocking: true
  expected_evidence: The unchanged legacy registry remains valid during the versioned transition.
- validator_id: aggregate_validation
  command_or_method: make validate at repository root
  blocking: true
  expected_evidence: Product and development-system validation pass.
- validator_id: diff_integrity
  command_or_method: git diff --check
  blocking: true
  expected_evidence: No whitespace or patch-integrity errors.
stop_conditions:
- The dry-run cannot preserve every live row trace ID requirement ID or legacy field exactly.
- The generalized contract would couple coverage to capability or verification.
- The current trace registry would require a TX-11 write.
- Any blocking validator fails after TX-11-scoped repair is exhausted.
- The required work expands into TX-12 data migration or TX-13 semantic validation.
