schema_id: SFA-SCHEMA-SKILL-001
schema_kind: schema_like_yaml_spec
status: draft
purpose: Define required metadata for governed Sys4AI skill adapters.
required_fields:
  id:
    type: string
  name:
    type: string
  family:
    type: string
  source_repo:
    type: string
  source_path:
    type: string
  local_path:
    type: string
  adaptation_status:
    type: enum
    values:
      - adapter_shell
      - imported_unadapted
      - adapted
      - deprecated
  lifecycle_status:
    type: enum
    values:
      - proposed
      - imported_unadapted
      - adapter_shell
      - adapted_runtime_active
      - product_scaffold_reference
      - deprecated
      - superseded
      - blocked
  required_files:
    type: list[string]
    default:
      - SKILL.md
      - README.md
      - AGENTS.md
      - examples/portable-example.md
recommended_fields:
  validators:
    type: list[string]
  authority_boundaries:
    type: list[string]
  known_failure_modes:
    type: list[string]
  required_skills:
    type: list[string]
  optional_skills:
    type: list[string]
  scripts:
    type: list[string]
  local_runtime_paths:
    type: mapping
  source_provenance:
    type: mapping
