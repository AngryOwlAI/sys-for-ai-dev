operations_and_maintenance_plan:
  artifact_id: OPS-MAINT-SFADEV-TX17-001
  owner_role_id: runtime_maintenance_planner
  operational_boundary: Pre-production framework safety controls and evaluation evidence only; no target runtime operation or service authority is granted.
  production_readiness: blocked
  operational_authority: not_granted
  monitoring_signals:
  - holdout mismatch or unexpected accept
  - permission envelope absence denial expiry or expansion
  - evaluator proposer or accepter identity collision
  - protected baseline or holdout digest drift
  - cross-layer or cross-target access attempt
  - reflection depth above one or recursion request
  - production claim without complete evidence
  incident_paths:
  - stop at the nearest safe boundary
  - cancel external actions and preserve uncertain-operation evidence
  - notify the system director security reviewer and accountable human
  - roll back or supersede the complete bounded baseline
  maintenance_cadence:
  - run focused safety and aggregate validation on every material controlled change
  - review threats holdouts and residual risk after any escaped failure
  - rotate or expand scenarios after material self-change
  - review permissions host evidence and operational gaps before promotion
  retention:
  - retain controlled packet holdout digest evaluation result completion and handoff evidence
  - minimize sensitive input and never retain credentials in fixtures
  - record any authorized cross-target access and disposition
  handoff_points:
  - TX-18 accountable human review
  - G-07 host verification
  - final production promotion and release acceptance
  - incident rollback and retirement review
  unresolved_readiness_gaps:
  - accountable human acceptance
  - observable host verification
  - independent external or confidential holdout evidence
  - target integration and ownership evidence
  - monitoring alert service and incident evidence
  - production approval and operational authority
