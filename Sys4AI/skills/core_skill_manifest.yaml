      - README.md
      - AGENTS.md
      - examples/portable-example.md
    description: "Long-session stakeholder elicitation workflow for system intent discovery with a 45 percent context-used checkpoint, threshold-only temp_prd.md handoff, and explicit end-of-questioning /conversation-to-prd prompt."
    required_skills:
      - codex-usage-metrics
    optional_skills:
      - conversation-to-prd
      - prd-to-implementation-plan
    local_runtime_paths:
      skills_root: skills/core
      target_skill_path: skills/core/system-definition-interview-context-45
