schema_id: SFA-SCHEMA-AGENTJOB-001
schema_kind: schema_like_yaml_spec
status: draft
purpose: Define required fields for Phase 1 AgentJob control records.
required_fields:
  agentjob_id:
    type: string
    description: Stable ID for the bounded job.
  objective:
    type: string
    description: One controlled unit of work.
  role:
    type: string
    description: Role authorized to execute the job.
  allowed_reads:
    type: list[string]
    description: Sources or paths the job may inspect.
  allowed_writes:
    type: list[string]
    description: Paths or artifacts the job may modify.
  forbidden_actions:
    type: list[string]
    description: Explicit actions outside the job boundary.
  expected_outputs:
    type: list[string]
    description: Artifacts, receipts, or changes the job must produce.
  validators:
    type: list[string]
    description: Commands or checks required before completion.
  stop_conditions:
    type: list[string]
    description: Conditions that require the job to halt or escalate.
recommended_fields:
  source_prds:
    type: list[string]
  completion_evidence:
    type: list[string]
  handoff_targets:
    type: list[string]
