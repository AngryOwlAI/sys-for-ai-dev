manifest_id: SFA-CORE-SKILL-MANIFEST-001
status: draft
source_repo: https://github.com/AngryOwlAI/ai-skills-for-sys
local_root: skills/core
policy: All listed skills are core product-scaffold requirements for the project being developed; Phase 1 includes adapter shells and provenance records. The active sys-for-ai-dev runtime surface is the root .agents/skills layer, with .codex/skills as compatibility shims.
skills:
  - id: continue
    name: Continue
    family: continuation_control
    source_repo: local
    source_path: .agents/skills/continue
    local_path: core/continue
    adaptation_status: scaffold_template
    required_files:
      - SKILL.md
      - README.md
      - AGENTS.md
      - examples/portable-example.md
    description: "Generic target-system continuation template for tracked state, latest handoff inspection, memory preflight, one bounded AgentJob, validation, and next handoff."
  - id: source-first-memory
    name: Source First Memory
    family: source_first_memory
    source_repo: local
    source_path: .agents/skills/source-first-memory
    local_path: core/source-first-memory
    adaptation_status: scaffold_template
    required_files:
      - SKILL.md
      - README.md
      - AGENTS.md
      - examples/portable-example.md
    description: "Generic target-system memory navigation template that requires source or registry inspection before memory affects claims or routing."
  - id: codex-usage-metrics
    name: Codex Usage Metrics
    family: runtime_session_accounting
    source_repo: https://github.com/AngryOwlAI/ai-skills-for-sys
    source_path: skills/codex-usage-metrics
    local_path: core/codex-usage-metrics
    adaptation_status: adapter_shell
    required_files:
      - SKILL.md
      - README.md
      - AGENTS.md
      - examples/portable-example.md
      - scripts/collect_usage_metrics.py
      - scripts/archive_temp_prd.py
    scripts:
      - scripts/collect_usage_metrics.py
      - scripts/archive_temp_prd.py
    description: "Capture Codex context, token, and rate-limit metrics into a refreshed local receipt without exporting conversation content."
  - id: system-definition-interview
    name: System Definition Interview
    family: system_definition_elicitation
    source_repo: https://github.com/AngryOwlAI/ai-skills-for-sys
    source_path: skills/system-definition-interview
    local_path: core/system-definition-interview
    adaptation_status: adapter_shell
    required_files:
      - SKILL.md
      - README.md
      - AGENTS.md
      - examples/portable-example.md
    description: "Interview stakeholders to establish or reconstruct system intent, boundaries, stakeholders, scenarios, candidate requirements, architecture drivers, interfaces, evidence, and V&V seeds before PRD or formal systems-document generation."
  - id: system-definition-interview-context-45
    name: System Definition Interview Context 45
    family: system_definition_elicitation
    source_repo: https://github.com/AngryOwlAI/ai-skills-for-sys
    source_path: skills/system-definition-interview-context-45
    local_path: core/system-definition-interview-context-45
    adaptation_status: adapter_shell
    required_files:
      - SKILL.md
      - README.md
      - AGENTS.md
      - examples/portable-example.md
    description: "Long-session stakeholder elicitation workflow for system intent discovery with a 45 percent context-used checkpoint and threshold-only temp_prd.md handoff."
    required_skills:
      - codex-usage-metrics
    local_runtime_paths:
      skills_root: skills/core
      target_skill_path: skills/core/system-definition-interview-context-45
      default_discovery_output_dir: control_records/system_definition
  - id: conversation-to-prd
    name: Conversation to PRD
    family: requirements_production
    source_repo: https://github.com/AngryOwlAI/ai-skills-for-sys
    source_path: skills/conversation-to-prd
