stop_conditions:
  - Any new skill lacks required manifest or authority rules.
  - A proposed core skill introduces project-specific domain constraints.
  - A product scaffold reference is promoted to runtime authority without a separate decision.
  - A required write is outside the AJ-07 allowlist.
  - More than one all-recommendations AgentJob is required.
forbidden_actions:
  - Add project-specific domain constraints as core.
  - Treat product scaffold skills as active development runtime authority.
  - Treat generated derivatives as canonical.
  - Execute more than one all-recommendations AgentJob in one continuation invocation.
memory_preflight:
  required: true
  minimum_queries:
    - core skill scaffold batch 1
    - core skill proposal registry validation
  required_evidence:
    - self-hosting boundary decision record inspection
    - latest controlled handoff inspection
    - all-recommendations plan AJ-07 inspection
    - core skill proposal registry inspection
expected_outputs:
  - Seven active development-runtime core skill scaffolds under .agents/skills.
  - Seven Codex compatibility shims under .codex/skills.
  - Seven product scaffold reference skills under sys-for-ai/skills/core.
  - Product and runtime skill registries updated.
  - Core skill proposal rows marked scaffolded.
  - Role crosswalk covers newly active runtime skills.
  - Completion receipt and handoff evidence.
validators:
  - make validate-dev-skills
  - cd sys-for-ai && make validate-skills
  - cd sys-for-ai && make validate-core-skill-proposals
  - cd sys-for-ai && make validate-check-diff
  - cd sys-for-ai && make validate
completion_evidence_required:
  - changed_artifacts
  - command_results
  - validation_status
  - residual_risk
handoff_policy:
  create_handoff_when:
    - core skill scaffold batch 1 completes
    - next AgentJob is recommended
authority_boundary:
  may_modify_runtime_skill_registry: true
  may_modify_product_scaffold: true
  may_modify_skill_validators: true
  may_add_project_specific_domain_constraints: false
  may_modify_canonical_prds: false
