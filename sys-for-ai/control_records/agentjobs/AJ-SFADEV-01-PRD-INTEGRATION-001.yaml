agentjob_id: AJ-SFADEV-01-PRD-INTEGRATION-001
schema_version: 0.2.0
status: completed
objective: >
  Add discovery gate, Requirements Discovery Record, system layer, self-hosting,
  role governance, and skill lifecycle requirements to the Phase 0 and Phase 1
  PRDs and trace every new Phase 0 requirement to Phase 1 initialization
  obligations.
lifecycle_stage: implementation_initialization
role_binding:
  role_id: system_engineer
  binding_type: one_job_provisional_role
  authority_scope: all-recommendations PRD integration and trace update
  expires_with_agentjob: true
required_inputs:
  - implementation_plans/sys-for-ai-dev_all_recommendations_implementation_plan.md
  - implementation_plans/self_hosting_boundary_decision_record.md
  - sys-for-ai/control_records/program_state.yaml
  - sys-for-ai/control_records/handoffs/HANDOFF-SFADEV-05-RUNTIME-SKILL-RECONCILIATION-001.yaml
  - PRDs/sys-for-ai_phase-0_product_system_design_prd.md
  - PRDs/sys-for-ai_phase-1_implementation_initialization_prd.md
  - sys-for-ai/registries/requirement_trace_registry.csv
allowed_reads:
  - PRDs/**
  - implementation_plans/**
  - temp_handoff/**
  - .agents/**
  - sys-for-ai/**
allowed_writes:
  - PRDs/sys-for-ai_phase-0_product_system_design_prd.md
  - PRDs/sys-for-ai_phase-1_implementation_initialization_prd.md
  - sys-for-ai/Makefile
  - sys-for-ai/sys_for_ai/cli.py
  - sys-for-ai/tests/test_agentjob_boundaries.py
  - sys-for-ai/tests/test_program_state.py
  - sys-for-ai/tests/test_self_hosting_acceptance.py
  - sys-for-ai/control_records/director_decisions/DDR-SFADEV-01-PRD-INTEGRATION-001.yaml
  - sys-for-ai/control_records/agentjobs/AJ-SFADEV-01-PRD-INTEGRATION-001.yaml
  - sys-for-ai/control_records/completions/RECEIPT-SFADEV-01-PRD-INTEGRATION-001.yaml
  - sys-for-ai/control_records/handoffs/HANDOFF-SFADEV-01-PRD-INTEGRATION-001.yaml
  - sys-for-ai/control_records/memory_preflights/MEMPREFLIGHT-SFADEV-01-PRD-INTEGRATION-001.yaml
  - sys-for-ai/control_records/program_state.yaml
  - sys-for-ai/registries/**
  - sys-for-ai/docs/generated/**
  - temp_handoff/handoff-0013.md
generated_paths:
  - sys-for-ai/docs/generated/**
forbidden_paths:
  - LICENSE
  - NOTICE
  - .git/**
  - .venv/**
  - sys-for-ai/.venv/**
  - sys-for-ai/docs/generated/** as canonical source
forbidden_actions:
  - Remove existing Phase 0 to Phase 1 boundary.
  - Mark RDR as canonical requirements baseline.
  - Execute more than one all-recommendations AgentJob in one continuation invocation.
  - Treat generated derivatives or chat memory as source authority.
  - Modify runtime skill authority or product scaffold skill authority.
memory_preflight:
  required: true
  minimum_queries:
    - all recommendations PRD integration
    - source-first memory continue handoff AgentJob
  required_evidence:
    - self-hosting boundary decision record inspection
    - latest controlled handoff inspection
    - all-recommendations plan AJ-01 inspection
    - canonical PRD and requirement trace inspection
expected_outputs:
  - Updated Phase 0 PRD with discovery gate RDR system layer self-hosting role governance and skill lifecycle requirements.
  - Updated Phase 1 PRD with corresponding initialization obligations.
  - Explicit requirement trace rows for every new Phase 0 requirement ID.
  - Completion receipt and handoff evidence.
validators:
  - cd sys-for-ai && make validate-requirement-trace
  - cd sys-for-ai && make validate-check-diff
  - make validate
completion_evidence_required:
  - changed_artifacts
  - command_results
  - validation_status
  - residual_risk
handoff_policy:
  create_handoff_when:
    - PRD integration completes
    - next AgentJob is recommended
authority_boundary:
  may_modify_product_scaffold: false
  may_modify_canonical_prds: true
  may_modify_requirement_trace: true
  may_promote_generated_derivatives: false
  may_change_runtime_skill_authority: false
  prd_authority_surface: PRDs
  trace_registry_surface: sys-for-ai/registries/requirement_trace_registry.csv
stop_conditions:
  - Required plan or latest handoff source cannot be inspected.
  - New requirement IDs collide.
  - Requirement trace validation fails.
  - Phase 0 and Phase 1 boundaries become mixed.
  - Required write is outside allowlist.
  - More than one AgentJob is required.
created_at: "2026-07-07T03:28:46Z"
activated_at: "2026-07-07T03:28:46Z"
completed_at: "2026-07-07T03:28:46Z"
