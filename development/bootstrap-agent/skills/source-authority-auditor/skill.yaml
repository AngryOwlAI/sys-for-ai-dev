skill_id: source-authority-auditor
version: 0.1.0
status: active
lifecycle_status: adapted_runtime_active
canonical_path: development/bootstrap-agent/skills/source-authority-auditor
summary: Audit canonical sources, generated derivatives, stale documents, and authority inversions.
scope:
  system_agnostic: true
  target_system_types:
    - agentic development systems
    - generated target systems
  intentional_specialization: Core source-authority audit skill.
  exemptions: []
domain_emphasis:
  - source_authority
  - registry_graph
  - derivative_control
required_role_posture:
  - system_analyst
  - system_engineer
  - software_engineer
  - documentation_librarian
  - context_memory_knowledge_architect
activation:
  triggers:
    - Memory or generated documentation could affect a claim.
    - Source authority is ambiguous.
    - A derivative might be treated as canonical.
  when_not_to_use:
    - Do not use as a substitute for inspecting the actual source file.
  preconditions:
    - A claim, route, or artifact set is available for audit.
inputs:
  required:
    - Claim or artifact path set.
    - Relevant registry rows or source candidates.
  optional:
    - Memory preflight output.
    - Generated derivative registry rows.
outputs:
  primary:
    - Source authority audit result.
  evidence:
    - Canonical sources inspected.
    - Authority inversions or no-inversion statement.
dependencies:
  required_skills: []
  optional_skills:
    - source-first-memory
  validation_skills: []
  python:
    standard_library_only: true
    notes: No skill-specific Python dependency.
  external_tools:
    - make
authority:
  may_read:
    - Source registries, derivative registries, object relationships, source files, handoffs, and generated docs.
  may_write:
    - Source registry or derivative registry rows only when explicit project authority permits those paths.
  may_not:
    - Treat memory, generated derivatives, or summaries as authority without source inspection.
validation:
  commands:
    - cd Sys4AI && make validate-registry-graph
  validator_classes:
    - trace_validation
    - process_validation
handoff:
  requires_completion_receipt: true
  evidence:
    - Source rows inspected.
    - Registry graph or derivative validation result.
