skill_id: artifact-contract-governance
version: 0.1.0
status: active
lifecycle_status: adapted_runtime_active
canonical_path: development/bootstrap-agent/skills/artifact-contract-governance
summary: Govern controlled artifact contracts, required sections, producers, consumers, and validation obligations.
scope:
  system_agnostic: true
  target_system_types:
    - agentic development systems
    - generated target systems
  intentional_specialization: Core artifact contract governance skill.
  exemptions: []
domain_emphasis:
  - artifact_governance
  - validation_contracts
  - source_authority
required_role_posture:
  - system_analyst
  - system_engineer
  - software_engineer
  - system_architect
  - documentation_librarian
activation:
  triggers:
    - Create or modify an artifact contract.
    - Add required sections for controlled artifacts.
    - Distinguish source artifacts from generated derivatives.
  when_not_to_use:
    - Do not use to bypass a specific schema or registry contract.
  preconditions:
    - The artifact type and authority purpose are known.
inputs:
  required:
    - Artifact type or path.
    - Producer and consumer roles.
  optional:
    - Existing artifact contract rows.
    - Validation contract rows.
outputs:
  primary:
    - Artifact contract update or audit result.
  evidence:
    - Artifact contract validator output.
    - Source rows inspected.
dependencies:
  required_skills: []
  optional_skills:
    - source-first-memory
    - technical-writing-quality-gate
  validation_skills: []
  python:
    standard_library_only: true
    notes: No skill-specific Python dependency.
  external_tools:
    - make
authority:
  may_read:
    - Artifact contracts, validation contracts, registries, schemas, templates, and controlled artifact examples.
  may_write:
    - Artifact contract registries or templates only when explicit project authority permits those paths.
  may_not:
    - Treat generated derivative artifacts as canonical source authority.
validation:
  commands:
    - cd Sys4AI && make validate-artifact-contracts
  validator_classes:
    - schema_validation
    - process_validation
handoff:
  requires_completion_receipt: true
  evidence:
    - Contract rows changed or no-change rationale.
    - Artifact-contract validator result.
