skill_id: system-definition-interview-context-45
version: 0.1.0
status: active
lifecycle_status: adapted_runtime_active
canonical_path: development/bootstrap-agent/skills/system-definition-interview-context-45
summary: Default Sys4AI-dev discovery gate for new or substantially changed system definitions with Codex metric checkpoints and threshold-only temp_prd handoff behavior.
scope:
  system_agnostic: false
  target_system_types:
    - Sys4AI-dev development workspace
    - Sys4AI product scaffold
  intentional_specialization: Project-fit runtime adaptation for Sys4AI-dev. Root development-system authorities outrank generated outputs and product-only scaffold adapters.
  exemptions: []
domain_emphasis:
  - system_definition
  - stakeholder_elicitation
  - strategic_intent_discovery
  - context_management
  - continuation_handoff
required_role_posture:
  - system_analyst
  - system_engineer
  - software_engineer
  - requirements_verifier
  - bounded_execution_planner
optional_role_posture:
  - documentation_librarian
  - requirements_verifier
  - verification_engineer
  - bounded_execution_planner
activation:
  triggers:
    - Start the default discovery gate for a new or substantially changed system definition.
    - Run system-definition discovery where context limits may matter.
    - Resume system-definition work from a temp_prd handoff.
    - Checkpoint discovery state when context use reaches the configured threshold.
  when_not_to_use:
    - Do not use as product-only scaffold authority inside Sys4AI.
    - Do not treat generated outputs as accepted project authority without owner or source approval.
    - Do not bypass root PRDs, implementation plans, registries, validators, or git-tracked files when they answer the question.
  preconditions:
    - Work is occurring in the Sys4AI-dev development workspace.
    - Relevant root authority files or product scaffold files can be inspected when claims depend on them.
    - Any generated output can be traced to source authority, explicit user decision, or labeled assumption.
inputs:
  required:
    - Current user request or active task objective.
    - Relevant Sys4AI-dev root authority files when the task depends on current project state.
  optional:
    - Root PRDs and implementation plans.
    - Sys4AI scaffold files, validators, registries, schemas, templates, and control records.
    - Prior handoff, generated draft, diagram, warning report, or temporary checkpoint.
outputs:
  primary:
    - Requirements Discovery Record with system layer classification, discovery gate marker, candidate requirements, evidence register, open questions, and downstream route.
    - Completion receipt or concise handoff when the task changes files or creates derivative material.
  secondary:
    - Assumptions, unresolved questions, skipped checks, and recommended next step.
    - Candidate vision, values, anti-values, approval gaps, conflicts, waivers, review cadence, and operational context preserved across handoffs.
    - End-of-questioning prompt asking whether to create a PRD with /conversation-to-prd using the current discussion and temp_prd.md if it exists.
    - Candidate requirements preserved as REQ-CAND-* or NFR-CAND-* until project authority promotes them.
  evidence:
    - Source files, validators, registries, user decisions, and repository observations used.
    - Distinction between canonical source, accepted project decision, generated derivative, and assumption.
    - Explicit user confirmation before PRD creation.
  handoff:
    - Files changed, validation commands run, skipped checks, remaining risk, and next owner action.
dependencies:
  required_skills:
    - codex-usage-metrics
  optional_skills:
    - conversation-to-prd
    - prd-to-implementation-plan
    - decision-grilling-context-45
  validation_skills: []
  python:
    standard_library_only: true
    notes: Skill package and root validator use Python standard library only unless a future project authority states otherwise.
  external_tools:
    - python3
    - make
    - git
authority:
  may_read:
    - Root README, PRDs, implementation plans, source registries, validators, schemas, templates, control records, and git-tracked files.
    - Sys4AI product scaffold files when product behavior, adapters, validators, or reference policy are in scope.
    - Existing adapted skill files under development/bootstrap-agent/skills and compatibility shims under .codex/skills.
  may_write:
    - development/bootstrap-agent/skills/system-definition-interview-context-45 when adapting or maintaining this runtime skill.
    - .codex/skills/system-definition-interview-context-45/SKILL.md when maintaining the compatibility shim.
    - Generated derivative artifacts only in project-approved locations for the active task.
  may_not:
    - Overwrite source authority with generated outputs.
    - Treat Sys4AI/assets/skills as the active runtime authority for Sys4AI-dev.
    - Delete or replace product scaffold adapters unless an explicit project authority requests it.
    - Import .DS_Store, __pycache__, pyc files, usage-metrics receipts, temp_prd checkpoints, secrets, or local operational state as source.
    - Create a PRD automatically without explicit user confirmation.
  canonical_sources:
    - Root PRDs and implementation plans.
    - Git-tracked validators, registries, schemas, templates, and source files.
    - Explicit user decisions in the active task.
    - development/bootstrap-agent/skills/system-definition-interview-context-45/skill.yaml and development/bootstrap-agent/skills/system-definition-interview-context-45/SKILL.md for this runtime skill.
  generated_derivatives:
    - Generated PRDs, implementation plans, diagrams, warning reports, metrics receipts, temporary handoffs, and completion receipts.
  human_gates:
    - Owner approval before generated requirements or plans become accepted scope.
    - Accountable human approval before candidate vision or core values become approved target intent.
    - Owner approval before deleting scaffold adapters or changing project authority policy.
    - User confirmation before routing the current discussion and existing temp_prd.md into conversation-to-prd.
validation:
  commands:
    - command: python3 development/tools/validate_skill_catalog.py --manifest development/bootstrap-agent/skills/system-definition-interview-context-45/skill.yaml
      validator_class: schema_validation
      mode: required
      dry_runnable: true
      notes: Checks the active runtime manifest for this skill.
    - command: test -f development/bootstrap-agent/skills/system-definition-interview-context-45/SKILL.md && test -f development/bootstrap-agent/skills/system-definition-interview-context-45/README.md && test -f development/bootstrap-agent/skills/system-definition-interview-context-45/AGENTS.md
      validator_class: path_validation
      mode: required
      dry_runnable: true
      notes: Confirms the adapted runtime package keeps required docs.
    - command: test -f .codex/skills/system-definition-interview-context-45/SKILL.md
      validator_class: path_validation
      mode: required
      dry_runnable: true
      notes: Confirms the Codex compatibility shim exists.
    - command: test -f development/bootstrap-agent/skills/codex-usage-metrics/SKILL.md
      validator_class: dependency_validation
      mode: required
      dry_runnable: true
      notes: Confirms required skill codex-usage-metrics is installed in the active runtime layer.
  validator_classes:
    - schema_validation
    - path_validation
    - dependency_validation
    - trace_validation
    - process_validation
  contextual_validation_rationale: Runtime correctness depends on current Sys4AI-dev source authority, requested artifact type, and project-local validators.
  evidence_required:
    - Relevant project authority inspected or unavailable evidence recorded.
    - Generated outputs labeled as derivatives until accepted.
    - Validation commands run or skipped with reasons.
    - Compatibility shim remains subordinate to canonical runtime path.
handoff:
  requires_completion_receipt: true
  evidence:
    - Task objective and source authority used.
    - Files changed or generated outputs created.
    - Validation commands run, skipped checks, and residual risk.
    - Logical next step and any human approval gate.
  next_role: system_engineer or verification_engineer for review and downstream implementation.
  open_issue_policy: Record missing authority, unresolved ambiguity, validation failures, or scaffold-boundary risks before ending the task.
failure_modes:
  - mode: Authority inversion.
    recovery: Re-anchor to root PRDs, implementation plans, validators, registries, and git-tracked source before proceeding.
  - mode: Product scaffold confusion.
    recovery: State that Sys4AI is the subsystem scaffold and development/bootstrap-agent/skills is the active development runtime layer.
  - mode: Generated-output promotion.
    recovery: Relabel as derivative or obtain explicit approval before treating the artifact as project authority.
  - mode: Automatic PRD creation.
    recovery: Ask the end-of-questioning /conversation-to-prd prompt and wait for explicit user confirmation before routing current discussion or temp_prd.md into PRD synthesis.
compatibility_shims:
  - .codex/skills/system-definition-interview-context-45/SKILL.md
