skill_id: system-layer-classifier
version: 0.1.0
status: active
lifecycle_status: adapted_runtime_active
canonical_path: development/bootstrap-agent/skills/system-layer-classifier
summary: Classify system layers so work does not confuse development, framework, scaffold, target, or derivative surfaces.
scope:
  system_agnostic: true
  target_system_types:
    - agentic development systems
    - generated target systems
  intentional_specialization: Core system-layer routing and authority classification skill.
  exemptions: []
domain_emphasis:
  - system_layer_governance
  - authority_boundary
  - self_hosting
required_role_posture:
  - system_analyst
  - system_engineer
  - software_engineer
  - system_director
activation:
  triggers:
    - A task touches multiple system layers.
    - A generated derivative might be mistaken for source authority.
    - Runtime and product scaffold surfaces might be confused.
  when_not_to_use:
    - Do not use as approval to write outside the explicit project authority.
  preconditions:
    - The relevant system or artifact paths are known.
inputs:
  required:
    - Candidate artifact paths or system surfaces.
    - Current routing context.
  optional:
    - System layer registry rows.
    - Self-hosting boundary decision records.
outputs:
  primary:
    - Layer classification and recommended authority boundary.
  evidence:
    - Registry rows and source files inspected.
dependencies:
  required_skills: []
  optional_skills:
    - source-first-memory
  validation_skills: []
  python:
    standard_library_only: true
    notes: No skill-specific Python dependency.
  external_tools:
    - make
authority:
  may_read:
    - System layer registries, boundary decisions, legacy control records, handoffs, source registries, and artifact paths.
  may_write:
    - Layer classification notes or registries only when explicit project authority permits those paths.
  may_not:
    - Promote product scaffold or generated derivatives to runtime authority.
validation:
  commands:
    - cd Sys4AI && make validate-system-layers
  validator_classes:
    - schema_validation
    - process_validation
handoff:
  requires_completion_receipt: true
  evidence:
    - Layer classification result.
    - Boundary risks or no-risk statement.
