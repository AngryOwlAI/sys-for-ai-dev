skill_id: context-window-and-handoff-manager
version: 0.1.0
status: active
lifecycle_status: adapted_runtime_active
canonical_path: development/bootstrap-agent/skills/context-window-and-handoff-manager
summary: Manage context checkpoints, resumable handoffs, and continuation evidence.
scope:
  system_agnostic: true
  target_system_types:
    - agentic development systems
    - generated target systems
  intentional_specialization: Core context-window and handoff management skill.
  exemptions: []
domain_emphasis:
  - context_handoff
  - continuation_control
  - completion_evidence
required_role_posture:
  - system_analyst
  - system_engineer
  - software_engineer
  - system_director
activation:
  triggers:
    - Long-running task needs a resumable checkpoint.
    - Context risk threatens reliable continuation.
    - A completion handoff must summarize source-backed evidence.
  when_not_to_use:
    - Do not use to replace required completion validation.
  preconditions:
    - Current project authorization or stop condition is known.
inputs:
  required:
    - Current project authorization or route.
    - Changed artifact list or blocker.
  optional:
    - Validation command results.
    - Latest handoff.
outputs:
  primary:
    - Resumable handoff or context checkpoint.
  evidence:
    - Source authority checked.
    - Next route and residual risks.
dependencies:
  required_skills: []
  optional_skills:
    - source-first-memory
    - codex-usage-metrics
  validation_skills: []
  python:
    standard_library_only: true
    notes: No skill-specific Python dependency.
  external_tools:
    - make
authority:
  may_read:
    - Program state, legacy control records, handoffs, receipts, memory preflight receipts, changed files, and validation output.
  may_write:
    - Handoff artifacts only when explicit project authority permits those paths.
  may_not:
    - Present a checkpoint as a completion receipt without validation evidence.
validation:
  commands:
    - cd Sys4AI && make validate-handoffs
  validator_classes:
    - process_validation
    - trace_validation
handoff:
  requires_completion_receipt: true
  evidence:
    - Handoff path.
    - Validation evidence or explicit blocker.
