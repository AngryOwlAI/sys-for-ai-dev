bundle_id: observability-and-quality
version: 0.1.0
status: active
description: Active Sys4AI-dev runtime skills for Codex observability, context-aware handoff, and prose quality.
includes:
  skills:
    - codex-usage-metrics
    - decision-grilling-context-45
    - domain-grilling-with-docs-context-45
    - system-definition-interview-context-45
    - technical-writing-quality-gate
  domain_packs: []
  optional_skills: []
  validation_skills: []
install:
  python: false
  external_tools:
    require_notice: true
    install_policy: detect_only
  allow_python_package_install: false
  dry_run_default: true
lock:
  output: development/bootstrap-agent/skill-catalog/SKILL_LOCK.yaml
  include_generated_timestamp: false
validation:
  commands:
    - python3 development/tools/validate_skill_catalog.py --bundle development/bootstrap-agent/skill-catalog/SKILL_BUNDLES/observability-and-quality.yaml
  expected_validator_classes:
    - schema_validation
    - dependency_validation
